// SCREEN: WALK / GATHER
// ============================================================
// Maze generation using recursive backtracking
function generateMaze(cols, rows) {
  // Each cell: { top, right, bottom, left } — true = wall exists
  const grid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = [];
    for (let c = 0; c < cols; c++) {
      grid[r][c] = { top: true, right: true, bottom: true, left: true, visited: false };
    }
  }
  const stack = [];
  let cur = { r: 0, c: 0 };
  grid[0][0].visited = true;
  stack.push(cur);

  while (stack.length > 0) {
    const { r, c } = cur;
    // Find unvisited neighbors
    const neighbors = [];
    if (r > 0 && !grid[r-1][c].visited) neighbors.push({ r: r-1, c, dir: 'top' });
    if (r < rows-1 && !grid[r+1][c].visited) neighbors.push({ r: r+1, c, dir: 'bottom' });
    if (c > 0 && !grid[r][c-1].visited) neighbors.push({ r, c: c-1, dir: 'left' });
    if (c < cols-1 && !grid[r][c+1].visited) neighbors.push({ r, c: c+1, dir: 'right' });

    if (neighbors.length > 0) {
      const next = neighbors[Math.floor(Math.random() * neighbors.length)];
      // Remove wall between cur and next
      if (next.dir === 'top')    { grid[r][c].top = false; grid[next.r][next.c].bottom = false; }
      if (next.dir === 'bottom') { grid[r][c].bottom = false; grid[next.r][next.c].top = false; }
      if (next.dir === 'left')   { grid[r][c].left = false; grid[next.r][next.c].right = false; }
      if (next.dir === 'right')  { grid[r][c].right = false; grid[next.r][next.c].left = false; }
      grid[next.r][next.c].visited = true;
      stack.push(cur);
      cur = next;
    } else {
      cur = stack.pop();
    }
  }

  // Remove a few extra walls to make it more open and less frustrating
  const removals = Math.floor(cols * rows * 0.12);
  for (let i = 0; i < removals; i++) {
    const rr = Math.floor(Math.random() * rows);
    const cc = Math.floor(Math.random() * cols);
    const dir = ['top','right','bottom','left'][Math.floor(Math.random() * 4)];
    if (dir === 'top' && rr > 0) { grid[rr][cc].top = false; grid[rr-1][cc].bottom = false; }
    if (dir === 'bottom' && rr < rows-1) { grid[rr][cc].bottom = false; grid[rr+1][cc].top = false; }
    if (dir === 'left' && cc > 0) { grid[rr][cc].left = false; grid[rr][cc-1].right = false; }
    if (dir === 'right' && cc < cols-1) { grid[rr][cc].right = false; grid[rr][cc+1].left = false; }
  }

  return grid;
}

// Convert maze grid to wall segments for collision
function getMazeWalls(maze, cols, rows, cs, ox, oy) {
  const walls = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = ox + c * cs;
      const y = oy + r * cs;
      if (maze[r][c].top)    walls.push({ x1: x, y1: y, x2: x + cs, y2: y });
      if (maze[r][c].left)   walls.push({ x1: x, y1: y, x2: x, y2: y + cs });
      // Right edge
      if (c === cols - 1 && maze[r][c].right) walls.push({ x1: x + cs, y1: y, x2: x + cs, y2: y + cs });
      // Bottom edge
      if (r === rows - 1 && maze[r][c].bottom) walls.push({ x1: x, y1: y + cs, x2: x + cs, y2: y + cs });
    }
  }
  return walls;
}

// Check circle vs line segment collision, return push-out vector
function circleVsSegment(cx, cy, rad, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  let t = ((cx - x1) * dx + (cy - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const closestX = x1 + t * dx;
  const closestY = y1 + t * dy;
  const distX = cx - closestX, distY = cy - closestY;
  const dist = Math.hypot(distX, distY);
  if (dist < rad && dist > 0.001) {
    const push = rad - dist;
    return { x: (distX / dist) * push, y: (distY / dist) * push };
  }
  return null;
}

function resolveWallCollisions(px, py, rad, walls) {
  let x = px, y = py;
  for (const wall of walls) {
    const push = circleVsSegment(x, y, rad, wall.x1, wall.y1, wall.x2, wall.y2);
    if (push) { x += push.x; y += push.y; }
  }
  return { x, y };
}

function initWalk() {
  const w = game.walk;
  w.distWalked = 0;
  w.gathered = 0;
  w.walkCounted = false;
  w.caught = false;
  w.caughtTimer = 0;
  w.hits = 0;
  w.companion = null;
  w.companionX = 0; w.companionY = 0;

  // If player has adult cats, show companion selection
  const adultCats = game.cats.filter(c => c.stage === 3);
  if (adultCats.length > 0 && game.currentStage > 0) {
    w.choosingCompanion = true;
  } else {
    w.choosingCompanion = false;
  }

  // Maze complexity scales with growth stage
  // Baby: no maze (open park), Kitten: easy 5x4, Teen: medium 7x5, Adult: hard 9x7
  const stage = game.currentStage;
  if (stage === 0) {
    // Baby: no maze, just open park
    w.maze = null;
    w.mazeW = 0; w.mazeH = 0; w.cellSize = 0;
    w.dogs = [];
  } else {
    const mazeSizes = [null, [5, 4], [7, 5], [9, 7]];
    const [mc, mr] = mazeSizes[stage];
    const cs = Math.min(Math.floor((W - 40) / mc), Math.floor((H - 100) / mr));
    w.cellSize = cs;
    w.mazeW = mc; w.mazeH = mr;
    const ox = Math.floor((W - mc * cs) / 2);
    const oy = Math.floor((H - mr * cs) / 2) + 10;
    w.mazeOX = ox; w.mazeOY = oy;
    w.maze = generateMaze(mc, mr);
    w.walls = getMazeWalls(w.maze, mc, mr, cs, ox, oy);

    // Place cat in top-left cell center
    w.px = ox + cs / 2;
    w.py = oy + cs / 2;

    // Dogs: 1 for kitten, 2 for teen, 3 for adult
    const dogCount = stage;
    w.dogs = [];
    for (let i = 0; i < dogCount; i++) {
      // Place in bottom-right area
      const dc = mc - 1 - (i % 2);
      const dr = mr - 1 - Math.floor(i / 2);
      w.dogs.push({
        x: ox + dc * cs + cs / 2,
        y: oy + dr * cs + cs / 2,
        vx: 0, vy: 0,
        facing: -1,
        speed: 55 + stage * 15,
        dir: Math.floor(Math.random() * 4), // 0=up 1=right 2=down 3=left
        changeTimer: 1 + Math.random() * 2,
        type: i % 3,
      });
    }
  }

  if (!w.maze) {
    // Open park - place cat in center
    w.px = 400; w.py = 300;
    w.dogs = [];
  }

  // Scatter collectible items
  w.items = [];
  const itemCount = stage === 0 ? 12 : (w.mazeW * w.mazeH > 20 ? 10 : 8);
  if (w.maze) {
    // Place items in maze cells
    const ox = w.mazeOX, oy = w.mazeOY, cs = w.cellSize;
    const cells = [];
    for (let r = 0; r < w.mazeH; r++)
      for (let c = 0; c < w.mazeW; c++)
        cells.push({ r, c });
    // Shuffle
    for (let i = cells.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cells[i], cells[j]] = [cells[j], cells[i]];
    }
    for (let i = 0; i < Math.min(itemCount, cells.length); i++) {
      const cell = cells[i];
      w.items.push({
        x: ox + cell.c * cs + cs * 0.2 + Math.random() * cs * 0.6,
        y: oy + cell.r * cs + cs * 0.2 + Math.random() * cs * 0.6,
        type: Math.floor(Math.random() * 4),
        collected: false,
        bob: Math.random() * Math.PI * 2
      });
    }
  } else {
    for (let i = 0; i < itemCount; i++) {
      w.items.push({
        x: 60 + Math.random() * 680,
        y: 80 + Math.random() * 440,
        type: Math.floor(Math.random() * 4),
        collected: false,
        bob: Math.random() * Math.PI * 2
      });
    }
  }
}

function updateWalk(dt) {
  const w = game.walk;

  // Caught animation
  if (w.caught) {
    w.caughtTimer -= dt;
    if (w.caughtTimer <= 0) {
      game.screen = 'care';
    }
    return;
  }

  const speed = 150;
  const catRad = 10;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
  if (dx || dy) {
    const mag = Math.sqrt(dx * dx + dy * dy);
    dx /= mag; dy /= mag;
    w.px += dx * speed * dt;
    w.py += dy * speed * dt;
    w.distWalked += speed * dt;
  }

  // Wall collisions for cat
  if (w.maze && w.walls) {
    const res = resolveWallCollisions(w.px, w.py, catRad, w.walls);
    w.px = res.x; w.py = res.y;
  }
  // Screen bounds
  w.px = Math.max(15, Math.min(W - 15, w.px));
  w.py = Math.max(55, Math.min(H - 15, w.py));

  // Dog AI and movement
  w.dogs.forEach(dog => {
    dog.changeTimer -= dt;
    if (dog.changeTimer <= 0) {
      dog.changeTimer = 1.5 + Math.random() * 2;
      // Chase player with some randomness
      const toPx = w.px - dog.x, toPy = w.py - dog.y;
      if (Math.random() < 0.6) {
        // Move toward player (prefer axis with bigger distance)
        if (Math.abs(toPx) > Math.abs(toPy)) {
          dog.dir = toPx > 0 ? 1 : 3;
        } else {
          dog.dir = toPy > 0 ? 2 : 0;
        }
      } else {
        dog.dir = Math.floor(Math.random() * 4);
      }
    }

    const dirs = [[0,-1],[1,0],[0,1],[-1,0]];
    const [ddx, ddy] = dirs[dog.dir];
    dog.x += ddx * dog.speed * dt;
    dog.y += ddy * dog.speed * dt;
    dog.facing = ddx !== 0 ? ddx : dog.facing;

    // Dog wall collisions
    if (w.maze && w.walls) {
      const res = resolveWallCollisions(dog.x, dog.y, 8, w.walls);
      // If dog got pushed, it hit a wall — change direction
      if (Math.abs(res.x - dog.x) > 0.5 || Math.abs(res.y - dog.y) > 0.5) {
        dog.changeTimer = 0; // force direction change next frame
      }
      dog.x = res.x; dog.y = res.y;
    }
    dog.x = Math.max(15, Math.min(W - 15, dog.x));
    dog.y = Math.max(55, Math.min(H - 15, dog.y));

    // Check catch — companion can protect
    const distToPlayer = Math.hypot(dog.x - w.px, dog.y - w.py);
    const distToCompanion = w.companion ? Math.hypot(dog.x - w.companionX, dog.y - w.companionY) : 999;

    // Companion attacks nearby dogs
    if (w.companion && distToCompanion < 35) {
      dog.stunTimer = 3;
      dog.x += (dog.x - w.companionX) * 0.5;
      dog.y += (dog.y - w.companionY) * 0.5;
      spawnParticles(game.chase.particles.length ? game.chase.particles : (w._particles || (w._particles = [])), dog.x, dog.y, 6, '#ffcc44', 50);
      addFloat(dog.x, dog.y - 20, '😼 Protected!', '#fa0');
      sfxDash();
      return;
    }

    if (distToPlayer < 22 && !w.caught) {
      w.hits++;
      sfxScrape();
      const sadEmotes = ['😿', '😢', '💔'];
      addFloat(w.px, w.py - 40, sadEmotes[w.hits - 1] || '😿', '#fa0');
      addFloat(w.px + 15, w.py - 55, `Hit ${w.hits}/3`, '#f88');
      dog.stunTimer = 2;
      // Push dog away
      dog.x += (dog.x - w.px) * 0.8;
      dog.y += (dog.y - w.py) * 0.8;

      if (w.hits >= 3) {
        w.caught = true;
        w.caughtTimer = 2.5;
        game.care = { feed: 0, play: 0, brush: 0, water: 0, walk: 0, gather: 0 };
        sfxLose();
        addFloat(w.px, w.py - 70, 'CAUGHT! Paw meter reset!', '#f44');
      }
    }
  });

  // Move companion — follows player
  if (w.companion) {
    const cdx = w.px - 25 - w.companionX;
    const cdy = w.py - w.companionY;
    const cDist = Math.hypot(cdx, cdy);
    if (cDist > 30) {
      const cSpd = 160;
      w.companionX += (cdx / cDist) * cSpd * dt;
      w.companionY += (cdy / cDist) * cSpd * dt;
    }
    // Companion wall collisions
    if (w.maze && w.walls) {
      const res = resolveWallCollisions(w.companionX, w.companionY, 8, w.walls);
      w.companionX = res.x; w.companionY = res.y;
    }
    w.companionX = Math.max(15, Math.min(W - 15, w.companionX));
    w.companionY = Math.max(55, Math.min(H - 15, w.companionY));
  }

  // Check item collection
  w.items.forEach(item => {
    if (!item.collected) {
      const dist = Math.hypot(item.x - w.px, item.y - w.py);
      if (dist < 20) {
        item.collected = true;
        w.gathered++;
        game.money += 1;
        sfxGather();
        addFloat(item.x, item.y - 20, '+1 Gather! +$1', '#f8d');
        if (game.care.gather < MAX_PER_ACTIVITY) {
          game.care.gather++;
          if (game.care.gather >= MAX_PER_ACTIVITY) setTimeout(() => sfxComplete(), 100);
        }
      }
    }
  });

  if (w.distWalked > 300 && !w.walkCounted) {
    w.walkCounted = true;
    game.money += 1;
    if (game.care.walk < MAX_PER_ACTIVITY) {
      game.care.walk++;
      addFloat(w.px, w.py - 60, '+1 Walk! +$1', '#8d6');
      if (game.care.walk >= MAX_PER_ACTIVITY) setTimeout(() => sfxComplete(), 100);
    }
  }
}

function drawWalk() {
  const w = game.walk;

  // Companion selection overlay
  if (w.choosingCompanion) {
    ctx.fillStyle = '#2d1b69';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffcc44';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Bring a Companion?', W / 2, 60);
    ctx.fillStyle = '#ddb8ff';
    ctx.font = '14px sans-serif';
    ctx.fillText('An adult cat can protect you from dogs!', W / 2, 85);

    const adultCats = game.cats.filter(c => c.stage === 3);
    const cols = Math.min(adultCats.length, 4);
    const cw = 130, ch = 130, gap = 12;
    const sx = (W - cols * cw - (cols - 1) * gap) / 2;
    adultCats.forEach((cat, i) => {
      const col = i % 4, row = Math.floor(i / 4);
      const cx = sx + col * (cw + gap);
      const cy = 110 + row * (ch + gap);
      const hover = hitBox(mouse.x, mouse.y, cx, cy, cw, ch);
      ctx.fillStyle = hover ? 'rgba(100,255,100,0.2)' : 'rgba(255,255,255,0.1)';
      ctx.strokeStyle = hover ? '#6c6' : '#444';
      ctx.lineWidth = 2;
      drawRoundRect(cx, cy, cw, ch, 10); ctx.fill(); ctx.stroke();
      drawCat(cx + cw/2, cy + ch/2 - 8, cat.breed, 3, 1, game.time + i, false);
      ctx.fillStyle = '#ddd'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(CAT_BREEDS[cat.breed].name, cx + cw/2, cy + ch - 12);
      if (mouse.clicked && hover) {
        sfxMeow();
        w.companion = cat;
        w.companionX = w.px - 30;
        w.companionY = w.py;
        w.choosingCompanion = false;
      }
    });

    // "Go Alone" button
    drawButton(W / 2 - 70, H - 60, 140, 40, 'Go Alone', '#636e72', true);
    if (mouse.clicked && hitBox(mouse.x, mouse.y, W / 2 - 70, H - 60, 140, 40)) {
      sfxClick();
      w.choosingCompanion = false;
    }
    return;
  }

  drawGrassBg();

  if (w.maze) {
    // Draw maze
    const ox = w.mazeOX, oy = w.mazeOY, cs = w.cellSize;

    // Maze floor
    ctx.fillStyle = '#d4b896';
    ctx.fillRect(ox, oy, w.mazeW * cs, w.mazeH * cs);

    // Cell floors (subtle checker)
    for (let r = 0; r < w.mazeH; r++) {
      for (let c = 0; c < w.mazeW; c++) {
        if ((r + c) % 2 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.03)';
          ctx.fillRect(ox + c * cs, oy + r * cs, cs, cs);
        }
      }
    }

    // Maze walls
    ctx.strokeStyle = '#6a4a2a';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    w.walls.forEach(wall => {
      ctx.beginPath();
      ctx.moveTo(wall.x1, wall.y1);
      ctx.lineTo(wall.x2, wall.y2);
      ctx.stroke();
    });

    // Hedge tops on walls (decorative)
    ctx.strokeStyle = '#4a7a3a';
    ctx.lineWidth = 6;
    ctx.globalAlpha = 0.5;
    w.walls.forEach(wall => {
      ctx.beginPath();
      ctx.moveTo(wall.x1, wall.y1 - 1);
      ctx.lineTo(wall.x2, wall.y2 - 1);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;
  } else {
    // Baby: open park with path and trees
    ctx.fillStyle = '#5a5';
    for (let i = 0; i < 6; i++) {
      const tx = (i * 137 + 50) % (W - 40) + 20;
      const ty = (i * 93 + 30) % (H - 120) + 80;
      ctx.fillStyle = '#8B6914';
      ctx.fillRect(tx - 4, ty, 8, 20);
      ctx.fillStyle = '#3a8a3a';
      drawEllipse(tx, ty - 5, 18, 20); ctx.fill();
      ctx.fillStyle = '#4a9a4a';
      drawEllipse(tx - 5, ty, 14, 15); ctx.fill();
      drawEllipse(tx + 8, ty - 2, 12, 14); ctx.fill();
    }
    ctx.fillStyle = '#d4b896';
    ctx.beginPath();
    ctx.moveTo(0, 350); ctx.quadraticCurveTo(200, 300, 400, 340);
    ctx.quadraticCurveTo(600, 380, 800, 320);
    ctx.lineTo(800, 380); ctx.quadraticCurveTo(600, 430, 400, 390);
    ctx.quadraticCurveTo(200, 350, 0, 400); ctx.closePath(); ctx.fill();
  }

  // Draw collectible items
  const itemIcons = ['🌸', '🪶', '🍃', '🐚'];
  w.items.forEach(item => {
    if (!item.collected) {
      const bob = Math.sin(game.time * 3 + item.bob) * 3;
      ctx.fillStyle = `rgba(255,255,200,${0.3 + Math.sin(game.time * 5 + item.bob) * 0.3})`;
      ctx.beginPath();
      ctx.arc(item.x, item.y + bob, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.font = '18px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(itemIcons[item.type], item.x, item.y + bob + 6);
    }
  });

  // Draw dogs
  w.dogs.forEach(dog => {
    drawDog(dog.x, dog.y, dog.type, game.time, dog.facing);
  });

  // Draw companion cat
  if (w.companion) {
    const cFacing = w.companionX < w.px ? 1 : -1;
    drawCat(w.companionX, w.companionY, w.companion.breed, 3, cFacing, game.time, true);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(CAT_BREEDS[w.companion.breed].name, w.companionX, w.companionY + 25);
  }

  // Draw player cat
  const moving = keys['ArrowLeft'] || keys['ArrowRight'] || keys['ArrowUp'] || keys['ArrowDown'] || keys['KeyA'] || keys['KeyD'] || keys['KeyW'] || keys['KeyS'];
  const facing = keys['ArrowLeft'] || keys['KeyA'] ? -1 : 1;

  if (w.caught) {
    // Caught animation — flash red
    ctx.globalAlpha = 0.5 + Math.sin(game.time * 15) * 0.3;
    drawCat(w.px, w.py, game.currentCat, game.currentStage, facing, game.time, false);
    ctx.globalAlpha = 1;
    // Big warning text
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('CAUGHT!', W / 2, H / 2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText('Paw meter reset to 0...', W / 2, H / 2);
  } else {
    drawCat(w.px, w.py, game.currentCat, game.currentStage, facing, game.time, moving);
  }

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  drawRoundRect(10, 10, 260, 40, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`Walk: ${game.care.walk}/${MAX_PER_ACTIVITY}   Gather: ${game.care.gather}/${MAX_PER_ACTIVITY}`, 20, 35);
  // Hit counter
  if (w.dogs.length > 0 && !w.caught) {
    ctx.font = '16px sans-serif';
    for (let hi = 0; hi < 3; hi++) {
      ctx.fillText(hi < (3 - w.hits) ? '💛' : '🖤', 200 + hi * 22, 36);
    }
    if (w.companion) {
      ctx.fillStyle = '#fda'; ctx.font = '11px sans-serif';
      ctx.fillText(`🛡️ ${CAT_BREEDS[w.companion.breed].name}`, 280, 36);
    }
  }

  // Stage difficulty label
  if (w.maze) {
    const diffLabels = ['', 'Easy Maze', 'Medium Maze', 'Hard Maze'];
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${diffLabels[game.currentStage]}  |  🐕 ${w.dogs.length} dog${w.dogs.length !== 1 ? 's' : ''}`, W / 2, 25);
  }

  // Warning about dogs
  if (w.dogs.length > 0 && !w.caught) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Watch out for dogs! If caught, your paw meter resets!', W / 2, H - 10);
  } else if (!w.caught) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Arrow keys / WASD to move  |  Collect sparkly items!', W / 2, H - 10);
  }

  // Return button (not during caught animation)
  if (!w.caught) {
    drawButton(W - 130, 10, 120, 35, 'Go Home', '#e17055', true);
    if (mouse.clicked && hitBox(mouse.x, mouse.y, W - 130, 10, 120, 35)) {
      sfxClick();
      game.screen = 'care';
      checkGrowth();
    }
  }

  drawFloats();
}

function initChase() {
  const c = game.chase;
  c.mapH = 3000; // Map height
  c.px = 400;
  c.py = c.mapH - 100; // Start at bottom
  c.vx = 0; c.vy = 0;
  c.scrapes = 0;
  c.timer = 300; // 5 minutes
  c.dashCooldown = 0;
  c.dashing = false;
  c.dashTimer = 0;
  c.won = false;
  c.lost = false;
  c.cameraY = c.py - H / 2;
  c.invincible = 0;
  c.particles = [];
  c.houseY = 120;

  // Place dogs
  c.dogs = [];
  const totalDogs = 10;
  for (let i = 0; i < totalDogs; i++) {
    const dogY = 200 + (c.mapH - 400) * (i / totalDogs) + Math.random() * 150;
    c.dogs.push({
      x: 60 + Math.random() * (W - 120),
      y: dogY,
      vx: 0, vy: 0,
      type: i % 3,
      alive: true,
      speed: 80 + Math.random() * 40,
      patrolX: 60 + Math.random() * (W - 120),
      patrolDir: Math.random() > 0.5 ? 1 : -1,
      facing: 1,
      aggro: false,
      stunTimer: 0,
    });
  }

  // Place obstacles (bushes, fences)

  for (let i = 0; i < 25; i++) {

      x: 30 + Math.random() * (W - 60),
      y: 180 + Math.random() * (c.mapH - 300),

      w: 40 + Math.random() * 30,
      h: 20 + Math.random() * 15
    });
  }
}

function updateChase(dt) {
  const c = game.chase;
  if (c.won || c.lost) return;

  // Timer
  c.timer -= dt;
  if (c.timer <= 0) {
    c.timer = 0;
    c.lost = true;
    sfxLose();
    return;
  }

  // Player movement
  const speed = c.dashing ? 350 : 180;
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
  if (dx || dy) {
    const mag = Math.sqrt(dx * dx + dy * dy);
    dx /= mag; dy /= mag;
  }
  c.vx = dx * speed;
  c.vy = dy * speed;
  c.px += c.vx * dt;
  c.py += c.vy * dt;
  c.px = Math.max(20, Math.min(W - 20, c.px));
  c.py = Math.max(40, Math.min(c.mapH - 20, c.py));

  // Dash
  if (c.dashCooldown > 0) c.dashCooldown -= dt;
  if ((keys['Space'] || keys['ShiftLeft'] || keys['ShiftRight']) && c.dashCooldown <= 0 && !c.dashing) {
    c.dashing = true;
    c.dashTimer = 0.3;
    c.dashCooldown = 1.5;
    c.invincible = 0.3;
    sfxDash();
    spawnParticles(c.particles, c.px, c.py, 8, '#ffcc44', 80);
  }
  if (c.dashing) {
    c.dashTimer -= dt;
    if (c.dashTimer <= 0) c.dashing = false;
    // Dash trail particles
    if (Math.random() > 0.5) {
      c.particles.push({
        x: c.px + (Math.random() - 0.5) * 20,
        y: c.py + (Math.random() - 0.5) * 20,
        vx: (Math.random() - 0.5) * 30,
        vy: (Math.random() - 0.5) * 30,
        life: 0.3, color: '#ffcc44', size: 3 + Math.random() * 3
      });
    }
  }
  if (c.invincible > 0) c.invincible -= dt;

  // Dogs AI
  c.dogs.forEach(dog => {
    if (!dog.alive) return;
    if (dog.stunTimer > 0) { dog.stunTimer -= dt; return; }

    const distToPlayer = Math.hypot(dog.x - c.px, dog.y - c.py);

    if (distToPlayer < 250) {
      dog.aggro = true;
    }
    if (distToPlayer > 400) {
      dog.aggro = false;
    }

    if (dog.aggro) {
      // Chase player
      const angle = Math.atan2(c.py - dog.y, c.px - dog.x);
      dog.vx = Math.cos(angle) * dog.speed;
      dog.vy = Math.sin(angle) * dog.speed;
      dog.facing = dog.vx > 0 ? 1 : -1;
    } else {
      // Patrol
      dog.vx = dog.patrolDir * dog.speed * 0.4;
      dog.vy = 0;
      dog.facing = dog.patrolDir;
      if (dog.x < 50 || dog.x > W - 50) dog.patrolDir *= -1;
    }

    dog.x += dog.vx * dt;
    dog.y += dog.vy * dt;
    dog.x = Math.max(20, Math.min(W - 20, dog.x));

    // Collision with player
    if (distToPlayer < 30) {
      if (c.dashing) {
        // Scratch the dog!
        dog.alive = false;
        game.money += 1; // $1 per dog scratched
        spawnParticles(c.particles, dog.x, dog.y, 12, '#ff4444', 120);
        addFloat(dog.x, dog.y - c.cameraY - 30, 'SCRATCH! +$1', '#ff4');
        sfxDash();
      } else if (c.invincible <= 0) {
        // Get scraped — no blood, just sad emotes
        c.scrapes++;
        c.invincible = 1.5;
        sfxScrape();
        spawnParticles(c.particles, c.px, c.py, 6, '#ffcc44', 40);
        const sadEmotes = ['😿', '😢', '💔', '😣', '😰'];
        addFloat(c.px, c.py - c.cameraY - 40, sadEmotes[c.scrapes - 1] || '😿', '#fa0');
        addFloat(c.px + 15, c.py - c.cameraY - 55, 'Ow!', '#fa0');
        dog.stunTimer = 1;

        if (c.scrapes >= 5) {
          c.lost = true;
          sfxLose();
          return;
        }
      }
    }
  });

  // Camera
  c.cameraY = lerp(c.cameraY, c.py - H / 2, 5 * dt);
  c.cameraY = Math.max(0, Math.min(c.mapH - H, c.cameraY));

  // Check win (reached house)
  if (c.py < c.houseY + 60) {
    c.won = true;
    game.money += 8; // $8 for surviving the chase
    sfxWin();
    // Save cat to collection
    game.cats.push({ breed: game.currentCat, stage: 3 });
  }

  updateParticles(c.particles, dt);
}

function drawChase() {
  const c = game.chase;
  const camY = c.cameraY;

  // Background - neighborhood
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#6ab86a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#7ec87e';
  ctx.fillRect(0, 0, W, H);

  // Road
  ctx.fillStyle = '#999';
  ctx.fillRect(W / 2 - 60, -camY, 120, c.mapH);
  // Road dashes
  ctx.fillStyle = '#fff';
  for (let ry = 0; ry < c.mapH; ry += 60) {
    ctx.fillRect(W / 2 - 3, ry - camY, 6, 30);
  }

  // Sidewalks
  ctx.fillStyle = '#ccc';
  ctx.fillRect(W / 2 - 80, -camY, 20, c.mapH);
  ctx.fillRect(W / 2 + 60, -camY, 20, c.mapH);

  // Houses along the sides
  for (let hy = 200; hy < c.mapH; hy += 250) {
    drawNeighborhoodHouse(80, hy - camY, false);
    drawNeighborhoodHouse(W - 180, hy - camY, true);
  }

  // Player's house at top
  drawPlayerHouse(W / 2, c.houseY - camY);

  // Obstacles
  c.obstacles.forEach(obs => {
    const oy = obs.y - camY;
    if (oy > -50 && oy < H + 50) {
      if (obs.type === 'bush') {
        ctx.fillStyle = '#3a8a3a';
        drawEllipse(obs.x, oy, obs.w / 2, obs.h / 2);
        ctx.fill();
        ctx.fillStyle = '#4a9a4a';
        drawEllipse(obs.x + 5, oy - 3, obs.w / 2 * 0.7, obs.h / 2 * 0.8);
        ctx.fill();
      } else {
        ctx.fillStyle = '#c8a87a';
        ctx.fillRect(obs.x - obs.w / 2, oy - obs.h, obs.w, obs.h);
        ctx.strokeStyle = '#a08060';
        ctx.lineWidth = 2;
        ctx.strokeRect(obs.x - obs.w / 2, oy - obs.h, obs.w, obs.h);
        // Fence posts
        ctx.fillStyle = '#a08060';
        ctx.fillRect(obs.x - obs.w / 2, oy - obs.h - 5, 4, obs.h + 5);
        ctx.fillRect(obs.x + obs.w / 2 - 4, oy - obs.h - 5, 4, obs.h + 5);
      }
    }
  });

  // Dogs
  c.dogs.forEach(dog => {
    if (!dog.alive) return;
    const dy = dog.y - camY;
    if (dy > -60 && dy < H + 60) {
      if (dog.stunTimer > 0) {
        ctx.globalAlpha = 0.5 + Math.sin(game.time * 20) * 0.3;
      }
      drawDog(dog.x, dy, dog.type, game.time, dog.facing);
      ctx.globalAlpha = 1;

      // Aggro indicator
      if (dog.aggro) {
        ctx.fillStyle = '#f44';
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('!', dog.x, dy - 35);
      }
    }
  });

  // Player cat
  const playerScreenY = c.py - camY;
  if (c.invincible > 0 && !c.dashing) {
    ctx.globalAlpha = 0.5 + Math.sin(game.time * 15) * 0.3;
  }
  if (c.dashing) {
    // Dash glow
    ctx.fillStyle = 'rgba(255, 204, 68, 0.3)';
    ctx.beginPath();
    ctx.arc(c.px, playerScreenY, 35, 0, Math.PI * 2);
    ctx.fill();
  }
  const moving = c.vx !== 0 || c.vy !== 0;
  const pFacing = c.vx < 0 ? -1 : 1;
  drawCat(c.px, playerScreenY, game.currentCat, 3, pFacing, game.time, moving);
  ctx.globalAlpha = 1;

  // Particles
  drawParticles(c.particles, 0, camY);

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  drawRoundRect(10, 10, 280, 60, 10);
  ctx.fill();

  // Timer
  const mins = Math.floor(c.timer / 60);
  const secs = Math.floor(c.timer % 60);
  ctx.fillStyle = c.timer < 30 ? '#f44' : '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${mins}:${secs.toString().padStart(2, '0')}`, 20, 38);

  // Scrapes (hearts)
  ctx.font = '20px sans-serif';
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i < (5 - c.scrapes) ? '#f44' : '#555';
    ctx.fillText('❤️', 100 + i * 28, 40);
  }

  // Dash cooldown
  ctx.fillStyle = '#333';
  drawRoundRect(20, 52, 80, 10, 4);
  ctx.fill();
  const dashPct = Math.max(0, 1 - c.dashCooldown / 1.5);
  ctx.fillStyle = dashPct >= 1 ? '#ffcc44' : '#886';
  drawRoundRect(20, 52, 80 * dashPct, 10, 4);
  ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.font = '10px sans-serif';
  ctx.fillText('DASH [Space]', 22, 49);

  // Mini-map
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  drawRoundRect(W - 60, 10, 50, 120, 6);
  ctx.fill();
  // Map content
  const mapScale = 110 / c.mapH;
  // House
  ctx.fillStyle = '#4f4';
  ctx.fillRect(W - 38, 15 + c.houseY * mapScale, 8, 6);
  // Player
  ctx.fillStyle = '#ff0';
  ctx.fillRect(W - 37, 15 + c.py * mapScale - 2, 6, 4);
  // Dogs
  c.dogs.forEach(dog => {
    if (dog.alive) {
      ctx.fillStyle = '#f44';
      ctx.fillRect(W - 37, 15 + dog.y * mapScale - 1, 4, 2);
    }
  });
  // Camera view
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(W - 55, 15 + camY * mapScale, 40, H * mapScale);

  // Arrow pointing to house
  if (c.py > c.houseY + 200) {
    ctx.fillStyle = '#4f4';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🏠 ↑', W / 2, 85);
  }

  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('WASD/Arrows to move  |  Space to Dash', W / 2, H - 8);

  drawFloats();

  // Win/Lose overlay
  if (c.won || c.lost) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);

    if (c.won) {
      ctx.fillStyle = '#4f4';
      ctx.font = 'bold 48px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('You Made It Home!', W / 2, H / 2 - 60);
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText(`${CAT_BREEDS[game.currentCat].name} is safe! +$8`, W / 2, H / 2 - 15);
      drawButton(W / 2 - 100, H / 2 + 20, 200, 50, 'Get New Cat!', '#6c5ce7', true);
      if (mouse.clicked && hitBox(mouse.x, mouse.y, W / 2 - 100, H / 2 + 20, 200, 50)) {
        sfxClick();
        game.screen = 'select';
      }
    } else {
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 48px sans-serif';
      ctx.textAlign = 'center';
      if (c.timer <= 0) {
        ctx.fillText('Time\'s Up!', W / 2, H / 2 - 60);
      } else {
        ctx.fillText('Too Many Scrapes!', W / 2, H / 2 - 60);
      }
      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText('The dogs got the best of you...', W / 2, H / 2 - 15);
      drawButton(W / 2 - 80, H / 2 + 20, 160, 50, 'Try Again', '#e17055', true);
      if (mouse.clicked && hitBox(mouse.x, mouse.y, W / 2 - 80, H / 2 + 20, 160, 50)) {
        sfxClick();
        game.currentStage = 3;
        initChase();
      }
      drawButton(W / 2 - 80, H / 2 + 85, 160, 40, 'Main Menu', '#636e72', true);
      if (mouse.clicked && hitBox(mouse.x, mouse.y, W / 2 - 80, H / 2 + 85, 160, 40)) {
        sfxClick();
        game.screen = 'title';
      }
    }
  }
}

function drawNeighborhoodHouse(x, y, flip) {
  if (y < -120 || y > H + 50) return;
  ctx.save();
  if (flip) ctx.translate(0, 0);

  // House body
  const colors = ['#e8d4b8', '#d4b8a0', '#c8a888', '#e0c8b0'];
  const roofColors = ['#b85450', '#7a6050', '#506078', '#808050'];
  const idx = Math.floor((x + y) * 0.01) % colors.length;

  ctx.fillStyle = colors[idx];
  ctx.fillRect(x, y - 60, 100, 70);

  // Roof
  ctx.fillStyle = roofColors[idx];
  ctx.beginPath();
  ctx.moveTo(x - 10, y - 60);
  ctx.lineTo(x + 50, y - 100);
  ctx.lineTo(x + 110, y - 60);
  ctx.closePath();
  ctx.fill();

  // Door
  ctx.fillStyle = '#8B6914';
  drawRoundRect(x + 38, y - 30, 24, 40, 4);
  ctx.fill();

  // Window
  ctx.fillStyle = '#aaddff';
  ctx.fillRect(x + 12, y - 48, 20, 18);
  ctx.fillRect(x + 68, y - 48, 20, 18);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(x + 12, y - 48, 20, 18);
  ctx.strokeRect(x + 68, y - 48, 20, 18);

  ctx.restore();
}

function drawPlayerHouse(x, y) {
  // Bigger, cozier house
  const hx = x - 60;
  const hy = y;

  // House body
  ctx.fillStyle = '#ffe8c8';
  ctx.fillRect(hx, hy - 50, 120, 60);
  ctx.strokeStyle = '#d4a060';
  ctx.lineWidth = 2;
  ctx.strokeRect(hx, hy - 50, 120, 60);

  // Roof
  ctx.fillStyle = '#e07050';
  ctx.beginPath();
  ctx.moveTo(hx - 15, hy - 50);
  ctx.lineTo(x, hy - 95);
  ctx.lineTo(hx + 135, hy - 50);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#c05040';
  ctx.stroke();

  // Door (green, welcoming)
  ctx.fillStyle = '#5a9a5a';
  drawRoundRect(x - 14, hy - 35, 28, 45, 5);
  ctx.fill();
  ctx.strokeStyle = '#3a7a3a';
  ctx.lineWidth = 2;
  drawRoundRect(x - 14, hy - 35, 28, 45, 5);
  ctx.stroke();

  // Doorknob
  ctx.fillStyle = '#ffcc44';
  ctx.beginPath();
  ctx.arc(x + 8, hy - 12, 3, 0, Math.PI * 2);
  ctx.fill();

  // Windows
  ctx.fillStyle = '#ffffaa';
  ctx.fillRect(hx + 10, hy - 42, 22, 20);
  ctx.fillRect(hx + 88, hy - 42, 22, 20);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(hx + 10, hy - 42, 22, 20);
  ctx.strokeRect(hx + 88, hy - 42, 22, 20);
  // Window cross
  ctx.beginPath();
  ctx.moveTo(hx + 21, hy - 42); ctx.lineTo(hx + 21, hy - 22);
  ctx.moveTo(hx + 10, hy - 32); ctx.lineTo(hx + 32, hy - 32);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(hx + 99, hy - 42); ctx.lineTo(hx + 99, hy - 22);
  ctx.moveTo(hx + 88, hy - 32); ctx.lineTo(hx + 110, hy - 32);
  ctx.stroke();

  // "HOME" sign
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🏠 HOME', x, hy - 55);

  // Welcome mat
  ctx.fillStyle = '#c8a060';
  drawRoundRect(x - 18, hy + 8, 36, 10, 3);
  ctx.fill();
}

// ============================================================
// SCREEN: COLLECTION
// ============================================================
function drawCollection() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#2d1b69');
  grad.addColorStop(1, '#1a1a4e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ffcc44';
  ctx.font = 'bold 32px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Your Cat Collection', W / 2, 45);

  ctx.fillStyle = '#b8a0dd';
  ctx.font = '13px sans-serif';
  ctx.fillText('Click a cat to show or hide them in your house!', W / 2, 68);

  if (game.cats.length === 0) {
    ctx.fillStyle = '#aaa';
    ctx.font = '18px sans-serif';
    ctx.fillText('No cats yet! Go raise one!', W / 2, H / 2);
  } else {
    const cols = 4;
    const cardW = 155, cardH = 155;
    const gap = 12;
    const totalCols = Math.min(game.cats.length, cols);
    const startX = (W - totalCols * cardW - (totalCols - 1) * gap) / 2;

    game.cats.forEach((cat, i) => {
      const row = Math.floor(i / cols);
      const col = i % cols;
      const cx = startX + col * (cardW + gap);
      const cy = 85 + row * (cardH + gap);

      const inHouse = game.houseCats.includes(i);
      const hover = hitBox(mouse.x, mouse.y, cx, cy, cardW, cardH);

      // Card bg
      ctx.fillStyle = inHouse ? 'rgba(100,255,100,0.15)' : 'rgba(255,255,255,0.08)';
      ctx.strokeStyle = inHouse ? '#6c6' : (hover ? '#886' : 'rgba(255,255,255,0.1)');
      ctx.lineWidth = inHouse ? 2.5 : 1.5;
      drawRoundRect(cx, cy, cardW, cardH, 12);
      ctx.fill();
      ctx.stroke();

      // Cat drawing
      drawCat(cx + cardW / 2, cy + cardH / 2 - 12, cat.breed, cat.stage, 1, game.time + i * 0.7, false);

      // Name
      ctx.fillStyle = '#eee';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(CAT_BREEDS[cat.breed].name, cx + cardW / 2, cy + cardH - 30);

      // House status badge
      if (inHouse) {
        ctx.fillStyle = '#6c6';
        ctx.font = '11px sans-serif';
        ctx.fillText('🏠 In House', cx + cardW / 2, cy + cardH - 14);
      } else {
        ctx.fillStyle = '#888';
        ctx.font = '11px sans-serif';
        ctx.fillText('Click to show', cx + cardW / 2, cy + cardH - 14);
      }

      // Hover highlight
      if (hover) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        drawRoundRect(cx - 1, cy - 1, cardW + 2, cardH + 2, 13);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Click to toggle house visibility
      if (mouse.clicked && hover) {
        sfxClick();
        if (inHouse) {
          game.houseCats = game.houseCats.filter(idx => idx !== i);
        } else {
          game.houseCats.push(i);
        }
      }
    });
  }

  // Count
  if (game.cats.length > 0) {
    ctx.fillStyle = '#a98cd8';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    const inHouseCount = game.houseCats.length;
    ctx.fillText(`${game.cats.length} cat${game.cats.length !== 1 ? 's' : ''} collected  |  ${inHouseCount} in house`, W / 2, H - 75);
  }

  // Back button
  drawButton(W / 2 - 60, H - 55, 120, 40, 'Back', '#636e72', true);
  if (mouse.clicked && hitBox(mouse.x, mouse.y, W / 2 - 60, H - 55, 120, 40)) {
    sfxClick();
    game.screen = game.currentCat !== null ? 'care' : 'title';
  }
}

// ============================================================
// MAIN GAME LOOP
// ============================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  game.time += dt;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Update & Draw based on screen
  switch (game.screen) {
    case 'title':
      updateTitle(dt);
      drawTitle();
      break;
    case 'select':
      drawSelect();
      break;
    case 'care':
      updateCare(dt);
      drawCare();
      break;
    case 'walk':
      updateWalk(dt);
      drawWalk();
      break;
    case 'chase':
      updateChase(dt);
      drawChase();
      break;
    case 'store':
      drawStore();
      break;
    case 'collection':
      drawCollection();
      break;
  }

  updateFloats(dt);

  // Reset click
  mouse.clicked = false;

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
