// Resize canvas to fit window
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// INPUT
// ============================================================
const keys = {};
const mouse = { x: 0, y: 0, clicked: false, down: false };

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
});
canvas.addEventListener('mousedown', () => { mouse.down = true; });
canvas.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
  mouse.clicked = true;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouse.x = (t.clientX - rect.left) * (W / rect.width);
  mouse.y = (t.clientY - rect.top) * (H / rect.height);
  mouse.down = true;
  mouse.clicked = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouse.x = (t.clientX - rect.left) * (W / rect.width);
  mouse.y = (t.clientY - rect.top) * (H / rect.height);
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); mouse.down = false; }, { passive: false });

canvas.addEventListener('wheel', e => {
  if (game.screen === 'store') {
    e.preventDefault();
    game.storeScroll += e.deltaY * 0.5;
  }
}, { passive: false });

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(freq, dur, type = 'sine', vol = 0.15) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + dur);
}

// ============================================================
// SAVE / LOAD (localStorage)
// ============================================================
const SAVE_KEY = 'catRunDash_save';
const SAVE_FIELDS = ['cats', 'currentCat', 'currentStage', 'care', 'money', 'inventory', 'equipped', 'furniture', 'ownedToys', 'houseCats', 'furniturePos'];

function saveGame() {
  try {
    const data = {};
    SAVE_FIELDS.forEach(k => { data[k] = game[k]; });
    data.screen = game.screen;
    // Don't save mid-chase or mid-walk — save as care screen
    if (data.screen === 'walk' || data.screen === 'chase') data.screen = 'care';
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) { /* storage full or unavailable — silently ignore */ }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    SAVE_FIELDS.forEach(k => {
      if (data[k] !== undefined) game[k] = data[k];
    });
    // Restore screen (default to care if a cat exists, else title)
    if (data.screen === 'care' || data.screen === 'store' || data.screen === 'collection') {
      game.screen = data.screen;
    } else if (game.currentCat !== null) {
      game.screen = 'care';
    } else {
      game.screen = 'title';
    }
    // Init cat behavior AI if we have a cat
    if (game.currentCat !== null) initCatAI();
    return true;
  } catch (e) { return false; }
}

// Autosave every 5 seconds
setInterval(saveGame, 5000);

// Load on startup
loadGame();

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawEllipse(cx, cy, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
}

function hitBox(mx, my, x, y, w, h) {
  return mx >= x && mx <= x + w && my >= y && my <= y + h;
}

function lerp(a, b, t) { return a + (b - a) * t; }

// ============================================================
// CAT DRAWING
// ============================================================
function drawCat(x, y, breedIdx, stage, facing = 1, animTime = 0, walking = false, eyesClosed = false) {
  const breed = CAT_BREEDS[breedIdx];
  const s = STAGE_SCALE[stage];
  const headRatio = STAGE_HEAD_RATIO[stage];

  const bodyW = 40 * s;
  const bodyH = 30 * s;
  const headR = bodyW * headRatio;

  // Bounce animation
  const bounce = walking ? Math.sin(animTime * 8) * 3 * s : Math.sin(animTime * 2) * 1.5 * s;

  ctx.save();
  ctx.translate(x, y + bounce);

  // Tail
  ctx.strokeStyle = breed.bodyColor;
  ctx.lineWidth = 5 * s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  const tailWag = Math.sin(animTime * 4) * 0.3;
  ctx.moveTo(-bodyW * 0.7 * facing, -bodyH * 0.1);
  ctx.quadraticCurveTo(
    -bodyW * 1.2 * facing, -bodyH * 0.8 + tailWag * 20,
    -bodyW * 0.9 * facing + Math.sin(animTime * 3) * 8, -bodyH * 1.2
  );
  ctx.stroke();

  // Body
  ctx.fillStyle = breed.bodyColor;
  drawEllipse(0, 0, bodyW, bodyH * 0.7);
  ctx.fill();

  // Tuxedo white belly
  if (breed.tuxedo) {
    ctx.fillStyle = breed.stripeColor;
    drawEllipse(0, bodyH * 0.1, bodyW * 0.6, bodyH * 0.45);
    ctx.fill();
  }

  // Calico patches
  if (breed.calico) {
    ctx.fillStyle = '#2a2a2a';
    drawEllipse(-bodyW * 0.3, -bodyH * 0.1, bodyW * 0.25, bodyH * 0.25);
    ctx.fill();
    ctx.fillStyle = '#f0eee8';
    drawEllipse(bodyW * 0.3, bodyH * 0.1, bodyW * 0.2, bodyH * 0.2);
    ctx.fill();
  }

  // Legs
  const legY = bodyH * 0.4;
  const legSpread = bodyW * 0.5;
  const legW = 7 * s;
  const legH = 14 * s;
  ctx.fillStyle = breed.bodyColor;
  for (let i = -1; i <= 1; i += 2) {
    const legBounce = walking ? Math.sin(animTime * 8 + i * 1.5) * 4 * s : 0;
    // Front legs
    drawEllipse(i * legSpread * 0.5 + facing * bodyW * 0.2, legY + legH * 0.3 + legBounce, legW, legH);
    ctx.fill();
    // Back legs
    drawEllipse(i * legSpread * 0.5 - facing * bodyW * 0.2, legY + legH * 0.3 - legBounce, legW * 1.1, legH);
    ctx.fill();
  }

  // Paw tips (white for tuxedo)
  if (breed.tuxedo) {
    ctx.fillStyle = '#f0eee8';
    for (let i = -1; i <= 1; i += 2) {
      const legBounce = walking ? Math.sin(animTime * 8 + i * 1.5) * 4 * s : 0;
      drawEllipse(i * legSpread * 0.5 + facing * bodyW * 0.2, legY + legH * 0.7 + legBounce, legW * 0.7, legH * 0.3);
      ctx.fill();
    }
  }

  // Head
  const headY = -bodyH * 0.5;
  const headX = facing * bodyW * 0.15;
  ctx.fillStyle = breed.bodyColor;
  drawEllipse(headX, headY, headR, headR * 0.9);
  ctx.fill();

  // Tuxedo face
  if (breed.tuxedo) {
    ctx.fillStyle = '#f0eee8';
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.3, headY + headR * 0.1);
    ctx.lineTo(headX, headY - headR * 0.2);
    ctx.lineTo(headX + headR * 0.3, headY + headR * 0.1);
    ctx.lineTo(headX, headY + headR * 0.6);
    ctx.closePath();
    ctx.fill();
  }

  // Ears
  const earW = headR * 0.5;
  const earH = headR * 0.7;
  for (let side = -1; side <= 1; side += 2) {
    const earX = headX + side * headR * 0.6;
    const earY = headY - headR * 0.7;
    // Outer ear
    ctx.fillStyle = breed.bodyColor;
    ctx.beginPath();
    ctx.moveTo(earX - earW * 0.5, earY + earH * 0.5);
    ctx.lineTo(earX, earY - earH * 0.5);
    ctx.lineTo(earX + earW * 0.5, earY + earH * 0.5);
    ctx.closePath();
    ctx.fill();
    // Inner ear
    ctx.fillStyle = breed.earInner;
    ctx.beginPath();
    ctx.moveTo(earX - earW * 0.25, earY + earH * 0.3);
    ctx.lineTo(earX, earY - earH * 0.2);
    ctx.lineTo(earX + earW * 0.25, earY + earH * 0.3);
    ctx.closePath();
    ctx.fill();
  }

  // Eyes
  const eyeSpread = headR * 0.4;
  const eyeY = headY - headR * 0.05;
  const eyeR = headR * 0.22;
  for (let side = -1; side <= 1; side += 2) {
    const eyeX = headX + side * eyeSpread;
    if (eyesClosed) {
      // Closed eyes — happy curved arcs
      ctx.strokeStyle = '#333';
      ctx.lineWidth = Math.max(1.5, 2 * s);
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, eyeR * 0.8, 0.1, Math.PI - 0.1);
      ctx.stroke();
    } else {
      // Open eyes
      ctx.fillStyle = '#fff';
      drawEllipse(eyeX, eyeY, eyeR, eyeR * 1.1);
      ctx.fill();
      ctx.fillStyle = '#111';
      drawEllipse(eyeX + facing * eyeR * 0.15, eyeY, eyeR * 0.55, eyeR * 0.65);
      ctx.fill();
      ctx.fillStyle = '#fff';
      drawEllipse(eyeX + eyeR * 0.2, eyeY - eyeR * 0.25, eyeR * 0.2, eyeR * 0.2);
      ctx.fill();
      ctx.fillStyle = breed.eyeColor;
      ctx.globalAlpha = 0.4;
      drawEllipse(eyeX + facing * eyeR * 0.1, eyeY, eyeR * 0.45, eyeR * 0.55);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  // Nose
  ctx.fillStyle = '#ffb0c0';
  ctx.beginPath();
  const noseX = headX + facing * headR * 0.05;
  const noseY = headY + headR * 0.25;
  ctx.moveTo(noseX, noseY - 2 * s);
  ctx.lineTo(noseX - 3 * s, noseY + 2 * s);
  ctx.lineTo(noseX + 3 * s, noseY + 2 * s);
  ctx.closePath();
  ctx.fill();

  // Mouth
  ctx.strokeStyle = '#c08090';
  ctx.lineWidth = 1.5 * s;
  ctx.beginPath();
  ctx.moveTo(noseX, noseY + 2 * s);
  ctx.lineTo(noseX - 3 * s, noseY + 5 * s);
  ctx.moveTo(noseX, noseY + 2 * s);
  ctx.lineTo(noseX + 3 * s, noseY + 5 * s);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle = breed.bodyColor === '#2a2a2a' ? '#666' : '#888';
  ctx.lineWidth = 1 * s;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(noseX + side * 4 * s, noseY + 1 * s + i * 2 * s);
      ctx.lineTo(noseX + side * (headR * 0.9), noseY + i * 4 * s);
      ctx.stroke();
    }
  }

  // Stripes (for tabby cats)
  if (!breed.calico && !breed.tuxedo && breed.stripeColor !== breed.bodyColor) {
    ctx.strokeStyle = breed.stripeColor;
    ctx.lineWidth = 2 * s;
    ctx.globalAlpha = 0.3;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(i * bodyW * 0.2 - bodyW * 0.1, -bodyH * 0.4);
      ctx.quadraticCurveTo(i * bodyW * 0.2, -bodyH * 0.1, i * bodyW * 0.2 + bodyW * 0.1, bodyH * 0.2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // === ACCESSORIES ===
  const eq = game.equipped;

  // ── Back accessories ──
  if (eq.back === 'cape' || eq.back === 'cape_blue') {
    ctx.fillStyle = eq.back === 'cape' ? '#e44' : '#44a';
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(-facing * bodyW * 0.1, -bodyH * 0.3);
    ctx.quadraticCurveTo(-facing * bodyW * 0.8, bodyH * 0.2, -facing * bodyW * 0.5, bodyH * 0.8 + Math.sin(animTime * 3) * 4);
    ctx.lineTo(-facing * bodyW * 0.1, bodyH * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (eq.back === 'wings_angel') {
    ctx.globalAlpha = 0.8;
    for (let wSide = -1; wSide <= 1; wSide += 2) {
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      const wx = -facing * bodyW * 0.2;
      ctx.moveTo(wx, -bodyH * 0.2);
      ctx.quadraticCurveTo(wx + wSide * bodyW * 0.9, -bodyH * 1.0 + Math.sin(animTime * 2 + wSide) * 3, wx + wSide * bodyW * 0.7, -bodyH * 0.1);
      ctx.quadraticCurveTo(wx + wSide * bodyW * 0.4, bodyH * 0.1, wx, bodyH * 0.1);
      ctx.fill();
      // Feather lines
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(wx + wSide * bodyW * 0.2, -bodyH * 0.3);
      ctx.lineTo(wx + wSide * bodyW * 0.5, -bodyH * 0.6);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }
  if (eq.back === 'wings_bat') {
    ctx.globalAlpha = 0.85;
    for (let wSide = -1; wSide <= 1; wSide += 2) {
      ctx.fillStyle = '#333';
      ctx.beginPath();
      const wx = -facing * bodyW * 0.2;
      ctx.moveTo(wx, -bodyH * 0.15);
      ctx.lineTo(wx + wSide * bodyW * 0.8, -bodyH * 0.9 + Math.sin(animTime * 3 + wSide) * 3);
      ctx.lineTo(wx + wSide * bodyW * 0.5, -bodyH * 0.3);
      ctx.lineTo(wx + wSide * bodyW * 0.7, -bodyH * 0.1);
      ctx.lineTo(wx + wSide * bodyW * 0.3, bodyH * 0.1);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  if (eq.back === 'backpack') {
    ctx.fillStyle = '#e07050';
    const bpx = -facing * bodyW * 0.35;
    drawRoundRect(bpx - 8 * s, -bodyH * 0.35, 16 * s, 18 * s, 4 * s);
    ctx.fill();
    ctx.fillStyle = '#c05030';
    ctx.fillRect(bpx - 6 * s, -bodyH * 0.15, 12 * s, 2 * s);
    // Buckle
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(bpx, -bodyH * 0.1, 2 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Neck accessories ──
  const neckY2 = headY + headR * 0.6;
  if (eq.neck === 'collar_red' || eq.neck === 'collar_gold' || eq.neck === 'collar_purple') {
    const colColors = { collar_red: '#e33', collar_gold: '#daa520', collar_purple: '#a050d0' };
    const tagColors = { collar_red: '#ff0', collar_gold: '#fff', collar_purple: '#e8a0ff' };
    ctx.strokeStyle = colColors[eq.neck];
    ctx.lineWidth = 4 * s;
    ctx.beginPath();
    ctx.ellipse(headX * 0.5, neckY2, bodyW * 0.35, bodyH * 0.15, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = tagColors[eq.neck];
    ctx.beginPath();
    ctx.arc(headX * 0.5, neckY2 + bodyH * 0.15, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.neck === 'bell_collar') {
    ctx.strokeStyle = '#e33';
    ctx.lineWidth = 3 * s;
    ctx.beginPath();
    ctx.ellipse(headX * 0.5, neckY2, bodyW * 0.35, bodyH * 0.15, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Bell
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(headX * 0.5, neckY2 + bodyH * 0.17, 4 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#b8960f';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(headX * 0.5, neckY2 + bodyH * 0.19, 1 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.neck === 'bowtie') {
    const btx = headX * 0.5, bty = neckY2;
    ctx.fillStyle = '#e33';
    ctx.beginPath();
    ctx.moveTo(btx, bty);
    ctx.lineTo(btx - 8 * s, bty - 5 * s);
    ctx.lineTo(btx - 8 * s, bty + 5 * s);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(btx, bty);
    ctx.lineTo(btx + 8 * s, bty - 5 * s);
    ctx.lineTo(btx + 8 * s, bty + 5 * s);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#c22';
    ctx.beginPath();
    ctx.arc(btx, bty, 2.5 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.neck === 'flower_lei') {
    ctx.lineWidth = 3 * s;
    const leiR = bodyW * 0.36;
    for (let fi = 0; fi < 8; fi++) {
      const angle = (fi / 8) * Math.PI * 2;
      const fx2 = headX * 0.5 + Math.cos(angle) * leiR;
      const fy2 = neckY2 + Math.sin(angle) * bodyH * 0.18;
      const flowerColors = ['#f6a', '#f80', '#ff0', '#f44', '#f6a', '#fa0', '#ff4', '#e55'];
      ctx.fillStyle = flowerColors[fi];
      ctx.beginPath();
      ctx.arc(fx2, fy2, 3 * s, 0, Math.PI * 2);
      ctx.fill();
    }
    // Vine
    ctx.strokeStyle = '#4a4';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.ellipse(headX * 0.5, neckY2, leiR, bodyH * 0.18, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  if (eq.neck === 'bandana') {
    ctx.fillStyle = '#e55';
    ctx.beginPath();
    ctx.moveTo(headX * 0.5 - bodyW * 0.3, neckY2 - 3 * s);
    ctx.lineTo(headX * 0.5 + bodyW * 0.3, neckY2 - 3 * s);
    ctx.lineTo(headX * 0.5, neckY2 + bodyH * 0.35);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#c33';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  if (eq.neck === 'scarf') {
    ctx.fillStyle = '#6af';
    ctx.beginPath();
    ctx.ellipse(headX * 0.5, neckY2, bodyW * 0.38, bodyH * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6af';
    ctx.beginPath();
    ctx.moveTo(headX * 0.5 + facing * bodyW * 0.2, neckY2);
    ctx.quadraticCurveTo(headX * 0.5 + facing * bodyW * 0.5, neckY2 + bodyH * 0.3, headX * 0.5 + facing * bodyW * 0.3, neckY2 + bodyH * 0.5 + Math.sin(animTime * 2) * 3);
    ctx.lineTo(headX * 0.5 + facing * bodyW * 0.15, neckY2 + bodyH * 0.1);
    ctx.fill();
    ctx.strokeStyle = '#48d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(headX * 0.5 - bodyW * 0.15, neckY2 - bodyH * 0.08);
    ctx.lineTo(headX * 0.5 + bodyW * 0.15, neckY2 - bodyH * 0.08);
    ctx.stroke();
  }
  if (eq.neck === 'pearl_necklace') {
    const pearlR = bodyW * 0.34;
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(headX * 0.5, neckY2, pearlR, bodyH * 0.15, 0, 0, Math.PI * 2);
    ctx.stroke();
    for (let pi = 0; pi < 10; pi++) {
      const angle = (pi / 10) * Math.PI * 2;
      const px2 = headX * 0.5 + Math.cos(angle) * pearlR;
      const py2 = neckY2 + Math.sin(angle) * bodyH * 0.15;
      ctx.fillStyle = '#f8f4f0';
      ctx.beginPath();
      ctx.arc(px2, py2, 2 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.arc(px2 - 0.5 * s, py2 - 0.5 * s, 0.8 * s, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Eye accessories ──
  if (eq.eyes === 'sunglasses') {
    ctx.fillStyle = 'rgba(30,30,30,0.85)';
    for (let side2 = -1; side2 <= 1; side2 += 2) {
      const sgX = headX + side2 * eyeSpread;
      drawRoundRect(sgX - eyeR * 1.3, eyeY - eyeR * 1.1, eyeR * 2.6, eyeR * 2, eyeR * 0.4);
      ctx.fill();
    }
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(headX - eyeSpread + eyeR * 1.1, eyeY);
    ctx.lineTo(headX + eyeSpread - eyeR * 1.1, eyeY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(headX - eyeSpread - eyeR * 1.2, eyeY);
    ctx.lineTo(headX - headR * 0.8, eyeY - eyeR);
    ctx.moveTo(headX + eyeSpread + eyeR * 1.2, eyeY);
    ctx.lineTo(headX + headR * 0.8, eyeY - eyeR);
    ctx.stroke();
  }
  if (eq.eyes === 'heart_glasses') {
    for (let side2 = -1; side2 <= 1; side2 += 2) {
      const sgX = headX + side2 * eyeSpread;
      ctx.fillStyle = 'rgba(220,40,80,0.8)';
      // Heart shape
      ctx.beginPath();
      const hr = eyeR * 1.2;
      ctx.moveTo(sgX, eyeY + hr * 0.6);
      ctx.bezierCurveTo(sgX - hr * 1.2, eyeY - hr * 0.3, sgX - hr * 0.6, eyeY - hr * 1.2, sgX, eyeY - hr * 0.4);
      ctx.bezierCurveTo(sgX + hr * 0.6, eyeY - hr * 1.2, sgX + hr * 1.2, eyeY - hr * 0.3, sgX, eyeY + hr * 0.6);
      ctx.fill();
    }
    // Bridge
    ctx.strokeStyle = '#c22';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(headX - eyeSpread + eyeR * 0.8, eyeY - eyeR * 0.2);
    ctx.lineTo(headX + eyeSpread - eyeR * 0.8, eyeY - eyeR * 0.2);
    ctx.stroke();
  }
  if (eq.eyes === 'star_glasses') {
    for (let side2 = -1; side2 <= 1; side2 += 2) {
      const sgX = headX + side2 * eyeSpread;
      ctx.fillStyle = 'rgba(255,200,0,0.85)';
      // Star shape
      ctx.beginPath();
      const sr = eyeR * 1.3;
      for (let si = 0; si < 5; si++) {
        const a1 = (si / 5) * Math.PI * 2 - Math.PI / 2;
        const a2 = ((si + 0.5) / 5) * Math.PI * 2 - Math.PI / 2;
        ctx.lineTo(sgX + Math.cos(a1) * sr, eyeY + Math.sin(a1) * sr);
        ctx.lineTo(sgX + Math.cos(a2) * sr * 0.45, eyeY + Math.sin(a2) * sr * 0.45);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#c90';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
    // Bridge
    ctx.strokeStyle = '#c90';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.moveTo(headX - eyeSpread + eyeR * 0.8, eyeY);
    ctx.lineTo(headX + eyeSpread - eyeR * 0.8, eyeY);
    ctx.stroke();
  }
  if (eq.eyes === 'monocle') {
    const mX = headX + eyeSpread; // right eye
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 2.5 * s;
    ctx.beginPath();
    ctx.arc(mX, eyeY, eyeR * 1.4, 0, Math.PI * 2);
    ctx.stroke();
    // Lens glare
    ctx.fillStyle = 'rgba(200,230,255,0.25)';
    ctx.beginPath();
    ctx.arc(mX, eyeY, eyeR * 1.3, 0, Math.PI * 2);
    ctx.fill();
    // Chain
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(mX, eyeY + eyeR * 1.4);
    ctx.quadraticCurveTo(mX + bodyW * 0.3, eyeY + bodyH * 0.5, headX * 0.5, neckY2);
    ctx.stroke();
  }

  // ── Head accessories ──
  const hatY = headY - headR * 0.9;
  if (eq.head === 'bow_blue' || eq.head === 'bow_pink' || eq.head === 'bow_red') {
    const bowColors = { bow_blue: ['#44a','#66d'], bow_pink: ['#f6a','#fad'], bow_red: ['#c22','#f66'] };
    const [bowColor, bowLight] = bowColors[eq.head];
    ctx.fillStyle = bowColor;
    ctx.beginPath();
    ctx.ellipse(headX - 7 * s, hatY, 6 * s, 4 * s, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX + 7 * s, hatY, 6 * s, 4 * s, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = bowLight;
    ctx.beginPath();
    ctx.arc(headX, hatY, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.head === 'flower_crown') {
    // Vine circle
    ctx.strokeStyle = '#4a4';
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 2 * s, headR * 0.6, 4 * s, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Flowers
    const fcColors = ['#f6a','#fa0','#f44','#ff0','#f8d','#e66'];
    for (let fi = 0; fi < 6; fi++) {
      const a = (fi / 6) * Math.PI * 2;
      const fx2 = headX + Math.cos(a) * headR * 0.6;
      const fy2 = hatY + 2 * s + Math.sin(a) * 4 * s;
      ctx.fillStyle = fcColors[fi];
      ctx.beginPath();
      ctx.arc(fx2, fy2, 3 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff0';
      ctx.beginPath();
      ctx.arc(fx2, fy2, 1.2 * s, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  if (eq.head === 'beanie') {
    ctx.fillStyle = '#6a6';
    ctx.beginPath();
    ctx.ellipse(headX, hatY - 2 * s, headR * 0.65, headR * 0.45, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Brim fold
    ctx.fillStyle = '#585';
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 2 * s, headR * 0.7, 3 * s, 0, 0, Math.PI);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 2 * s, headR * 0.7, 3 * s, 0, Math.PI, Math.PI * 2);
    ctx.fill();
    // Pom pom
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(headX, hatY - headR * 0.4, 4 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.head === 'party_hat') {
    ctx.fillStyle = '#e44';
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.4, hatY + 3 * s);
    ctx.lineTo(headX, hatY - 16 * s);
    ctx.lineTo(headX + headR * 0.4, hatY + 3 * s);
    ctx.closePath();
    ctx.fill();
    // Stripes
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2 * s;
    for (let pi = 1; pi <= 3; pi++) {
      const py3 = hatY + 3 * s - pi * 4.5 * s;
      const pw = headR * 0.4 * (1 - pi * 0.22);
      ctx.beginPath();
      ctx.moveTo(headX - pw, py3);
      ctx.lineTo(headX + pw, py3);
      ctx.stroke();
    }
    // Pom
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(headX, hatY - 16 * s, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  }
  if (eq.head === 'cowboy_hat') {
    ctx.fillStyle = '#b8864e';
    // Brim (wide)
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 2 * s, headR * 1.0, 5 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Crown (dented top)
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.45, hatY + 2 * s);
    ctx.quadraticCurveTo(headX - headR * 0.45, hatY - 12 * s, headX - headR * 0.15, hatY - 10 * s);
    ctx.quadraticCurveTo(headX, hatY - 8 * s, headX + headR * 0.15, hatY - 10 * s);
    ctx.quadraticCurveTo(headX + headR * 0.45, hatY - 12 * s, headX + headR * 0.45, hatY + 2 * s);
    ctx.closePath();
    ctx.fill();
    // Band
    ctx.fillStyle = '#8a5e2a';
    ctx.fillRect(headX - headR * 0.45, hatY - 1 * s, headR * 0.9, 3 * s);
  }
  if (eq.head === 'wizard_hat') {
    // Tall pointy hat
    ctx.fillStyle = '#336';
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.55, hatY + 3 * s);
    ctx.quadraticCurveTo(headX - headR * 0.1, hatY - 22 * s, headX + headR * 0.3, hatY - 20 * s);
    ctx.lineTo(headX + headR * 0.55, hatY + 3 * s);
    ctx.closePath();
    ctx.fill();
    // Brim
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 3 * s, headR * 0.75, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Stars
    ctx.fillStyle = '#ff0';
    ctx.font = `${6 * s}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('★', headX - 3 * s, hatY - 6 * s);
    ctx.fillText('★', headX + 5 * s, hatY - 12 * s);
    ctx.font = `${4 * s}px sans-serif`;
    ctx.fillText('★', headX + 1 * s, hatY - 2 * s);
  }
  if (eq.head === 'pirate_hat') {
    ctx.fillStyle = '#222';
    // Hat body
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.8, hatY + 2 * s);
    ctx.quadraticCurveTo(headX - headR * 0.5, hatY - 10 * s, headX, hatY - 6 * s);
    ctx.quadraticCurveTo(headX + headR * 0.5, hatY - 10 * s, headX + headR * 0.8, hatY + 2 * s);
    ctx.closePath();
    ctx.fill();
    // Brim
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 3 * s, headR * 0.8, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    // Skull
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(headX, hatY - 4 * s, 3.5 * s, 0, Math.PI * 2);
    ctx.fill();
    // Crossbones
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5 * s;
    ctx.beginPath();
    ctx.moveTo(headX - 4 * s, hatY - 1 * s); ctx.lineTo(headX + 4 * s, hatY - 7 * s);
    ctx.moveTo(headX + 4 * s, hatY - 1 * s); ctx.lineTo(headX - 4 * s, hatY - 7 * s);
    ctx.stroke();
  }
  if (eq.head === 'tophat') {
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(headX, hatY + 2 * s, headR * 0.7, 4 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    drawRoundRect(headX - headR * 0.35, hatY - 16 * s, headR * 0.7, 18 * s, 3 * s);
    ctx.fill();
    ctx.fillStyle = '#a44';
    ctx.fillRect(headX - headR * 0.35, hatY - 3 * s, headR * 0.7, 3 * s);
  }
  if (eq.head === 'crown') {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    const cw = headR * 0.65;
    const ch = 10 * s;
    ctx.moveTo(headX - cw, hatY);
    ctx.lineTo(headX - cw, hatY - ch);
    ctx.lineTo(headX - cw * 0.5, hatY - ch * 0.5);
    ctx.lineTo(headX, hatY - ch);
    ctx.lineTo(headX + cw * 0.5, hatY - ch * 0.5);
    ctx.lineTo(headX + cw, hatY - ch);
    ctx.lineTo(headX + cw, hatY);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#b8960f';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#e33';
    ctx.beginPath(); ctx.arc(headX, hatY - ch * 0.7, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#33e';
    ctx.beginPath(); ctx.arc(headX - cw * 0.55, hatY - ch * 0.5, 1.5 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(headX + cw * 0.55, hatY - ch * 0.5, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  }
  if (eq.head === 'halo') {
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2.5 * s;
    ctx.globalAlpha = 0.7 + Math.sin(animTime * 3) * 0.2;
    ctx.beginPath();
    ctx.ellipse(headX, hatY - 6 * s, headR * 0.55, 3.5 * s, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.ellipse(headX, hatY - 6 * s, headR * 0.5, 2.5 * s, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// DOG DRAWING
// ============================================================
function drawDog(x, y, type, animTime, facing = 1) {
  const colors = [
    { body: '#b8864e', ear: '#8a5e2a', spot: '#d4a060' },
    { body: '#666', ear: '#444', spot: '#888' },
    { body: '#c4956a', ear: '#a07040', spot: '#e0b890' },
  ];
  const c = colors[type % colors.length];
  const s = 1;
  const bounce = Math.sin(animTime * 6) * 2;

  ctx.save();
  ctx.translate(x, y + bounce);

  // Tail
  ctx.strokeStyle = c.body;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-20 * facing, -8);
  ctx.quadraticCurveTo(-30 * facing, -25 + Math.sin(animTime * 8) * 8, -25 * facing, -30);
  ctx.stroke();

  // Body
  ctx.fillStyle = c.body;
  drawEllipse(0, 0, 28, 18);
  ctx.fill();

  // Spot
  ctx.fillStyle = c.spot;
  drawEllipse(-5 * facing, -3, 10, 8);
  ctx.fill();

  // Legs
  ctx.fillStyle = c.body;
  for (let i = -1; i <= 1; i += 2) {
    const lb = Math.sin(animTime * 6 + i) * 4;
    drawEllipse(i * 12 + facing * 6, 14 + lb, 5, 10);
    ctx.fill();
    drawEllipse(i * 12 - facing * 6, 14 - lb, 5, 10);
    ctx.fill();
  }

  // Head
  const headX = facing * 22;
  const headY = -10;
  ctx.fillStyle = c.body;
  drawEllipse(headX, headY, 16, 14);
  ctx.fill();

  // Snout
  ctx.fillStyle = c.spot;
  drawEllipse(headX + facing * 12, headY + 4, 9, 7);
  ctx.fill();

  // Nose
  ctx.fillStyle = '#222';
  drawEllipse(headX + facing * 18, headY + 2, 4, 3);
  ctx.fill();

  // Mouth (angry)
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(headX + facing * 10, headY + 8);
  ctx.lineTo(headX + facing * 18, headY + 7);
  ctx.stroke();

  // Teeth
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(headX + facing * 12, headY + 7);
  ctx.lineTo(headX + facing * 13, headY + 11);
  ctx.lineTo(headX + facing * 14, headY + 7);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + facing * 15, headY + 7);
  ctx.lineTo(headX + facing * 16, headY + 10);
  ctx.lineTo(headX + facing * 17, headY + 7);
  ctx.fill();

  // Eyes (angry)
  ctx.fillStyle = '#fff';
  drawEllipse(headX + facing * 4, headY - 4, 5, 5);
  ctx.fill();
  ctx.fillStyle = '#811';
  drawEllipse(headX + facing * 5, headY - 3, 3, 3.5);
  ctx.fill();
  ctx.fillStyle = '#fff';
  drawEllipse(headX + facing * 5.5, headY - 4.5, 1.2, 1.2);
  ctx.fill();

  // Angry eyebrows
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(headX + facing * -1, headY - 9);
  ctx.lineTo(headX + facing * 9, headY - 7);
  ctx.stroke();

  // Ears (floppy)
  ctx.fillStyle = c.ear;
  ctx.beginPath();
  const earX = headX - facing * 4;
  ctx.ellipse(earX, headY - 10, 7, 10, facing * 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// ============================================================
// PAW METER
// ============================================================
function drawPawMeter(x, y, care, scale = 1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Paw pad positions (toe beans + metacarpal + carpal)
  const beans = [
    { x: -28, y: -35, r: 11, act: 'feed' },   // toe 1
    { x: -9,  y: -42, r: 11, act: 'play' },    // toe 2
    { x: 9,   y: -42, r: 11, act: 'brush' },   // toe 3
    { x: 28,  y: -35, r: 11, act: 'water' },   // toe 4
    { x: 0,   y: 0,   r: 20, act: 'walk' },    // metacarpal (big pad)
    { x: -30, y: 15,  r: 8,  act: 'gather' },  // carpal (side pad)
  ];

  // Draw paw outline bg
  ctx.fillStyle = '#f5e0d0';
  ctx.strokeStyle = '#d4a080';
  ctx.lineWidth = 3;

  beans.forEach(b => {
    drawEllipse(b.x, b.y, b.r, b.r * 0.9);
    ctx.fill();
    ctx.stroke();
  });

  // Fill based on progress
  beans.forEach((b, i) => {
    const act = b.act;
    const progress = care[act] / MAX_PER_ACTIVITY;
    if (progress > 0) {
      ctx.fillStyle = ACTIVITY_COLORS[i];
      ctx.globalAlpha = 0.3 + progress * 0.7;
      drawEllipse(b.x, b.y, b.r * progress, b.r * 0.9 * progress);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Label
    ctx.fillStyle = '#865';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${care[act]}/${MAX_PER_ACTIVITY}`, b.x, b.y + b.r + 12);

    // Icon
    ctx.font = b.r > 15 ? '16px sans-serif' : '11px sans-serif';
    ctx.fillText(ACTIVITY_ICONS[i], b.x, b.y + 4);
  });

  ctx.restore();
}

// ============================================================
// BUTTON HELPER
// ============================================================
function drawButton(x, y, w, h, text, color, hovered = false, icon = '') {
  ctx.save();
  const hover = hovered && hitBox(mouse.x, mouse.y, x, y, w, h);

  ctx.fillStyle = hover ? lighten(color, 30) : color;
  ctx.strokeStyle = darken(color, 40);
  ctx.lineWidth = 3;
  drawRoundRect(x, y, w, h, 12);
  ctx.fill();
  ctx.stroke();

  if (hover) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
  }

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (icon) {
    ctx.font = '20px sans-serif';
    ctx.fillText(icon, x + w / 2, y + h / 2 - 10);
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText(text, x + w / 2, y + h / 2 + 12);
  } else {
    ctx.fillText(text, x + w / 2, y + h / 2);
  }
  ctx.restore();

  return hover;
}

function lighten(hex, amt) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.min(255, r + amt); g = Math.min(255, g + amt); b = Math.min(255, b + amt);
  return `rgb(${r},${g},${b})`;
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, r - amt); g = Math.max(0, g - amt); b = Math.max(0, b - amt);
  return `rgb(${r},${g},${b})`;
}

// FLOATING TEXT
// ============================================================
function addFloat(x, y, text, color = '#fff') {
  game.floats.push({ x, y, text, color, life: 1.5 });
}

function updateFloats(dt) {
  game.floats = game.floats.filter(f => {
    f.y -= 30 * dt;
    f.life -= dt;
    return f.life > 0;
  });
}

function drawFloats() {
  game.floats.forEach(f => {
    ctx.globalAlpha = Math.min(1, f.life * 2);
    ctx.fillStyle = f.color;
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(f.text, f.x, f.y);
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// PARTICLE SYSTEM
// ============================================================
function spawnParticles(arr, x, y, count, color, speed = 100) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random());
    arr.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 0.5 + Math.random() * 0.5,
      color,
      size: 2 + Math.random() * 4
    });
  }
}

function updateParticles(arr, dt) {
  for (let i = arr.length - 1; i >= 0; i--) {
    const p = arr[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    p.size *= 0.98;
    if (p.life <= 0) arr.splice(i, 1);
  }
}

function drawParticles(arr, offsetX = 0, offsetY = 0) {
  arr.forEach(p => {
    ctx.globalAlpha = Math.min(1, p.life * 2);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - offsetX, p.y - offsetY, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ============================================================
// SCREEN: CAT SELECTION
// ============================================================
function drawSelect() {
  drawHomeBg();

  ctx.fillStyle = '#6a4';
  ctx.font = 'bold 36px sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#384';
  ctx.lineWidth = 4;
  ctx.strokeText('Choose Your Cat!', W / 2, 60);
  ctx.fillText('Choose Your Cat!', W / 2, 60);

  // Cat grid (2 rows of 3)
  const cols = 3, rows = 2;
  const cardW = 180, cardH = 180;
  const startX = (W - cols * cardW - (cols - 1) * 20) / 2;
  const startY = 90;

  for (let i = 0; i < CAT_BREEDS.length; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const cx = startX + col * (cardW + 20);
    const cy = startY + row * (cardH + 15);

    const hover = hitBox(mouse.x, mouse.y, cx, cy, cardW, cardH);

    // Card
    ctx.fillStyle = hover ? '#fff8f0' : '#fff5e8';
    ctx.strokeStyle = hover ? '#f4a442' : '#ddd';
    ctx.lineWidth = hover ? 3 : 2;
    drawRoundRect(cx, cy, cardW, cardH, 12);
    ctx.fill();
    ctx.stroke();

    // Cat
    drawCat(cx + cardW / 2, cy + cardH / 2 - 10, i, 0, 1, game.time, false);

    // Name
    ctx.fillStyle = '#555';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(CAT_BREEDS[i].name, cx + cardW / 2, cy + cardH - 15);

    // Click to select
    if (mouse.clicked && hover) {
      sfxMeow();
      game.currentCat = i;
      game.currentStage = 0;
      resetCare();
      initCatAI();
      game.screen = 'care';
    }
  }
}

// Furniture interaction spots (x, y, behavior, requires)
function getFurnitureSpots() {
  const spots = [
    // Default spots (always available)
    { x: 300, y: 340, behavior: 'sitting', weight: 2 },
    { x: 200, y: 360, behavior: 'grooming', weight: 2 },
    { x: 400, y: 350, behavior: 'looking', weight: 2 },
    { x: 500, y: 360, behavior: 'idle', weight: 1 },
    { x: 150, y: 370, behavior: 'playing', weight: 1 },
  ];
  const owned = game.furniture;
  // Furniture-specific behaviors — positions are dynamic (draggable)

// Returns 0-1 how full the paw is overall
function getPawMood() {
  const total = ACTIVITIES.reduce((sum, a) => sum + game.care[a], 0);
  const max = ACTIVITIES.length * MAX_PER_ACTIVITY;
  return total / max;
}

function getMoodEmotes(state) {
  const mood = getPawMood();
  if (mood >= 0.5) return BEHAVIOR_EMOTES_HAPPY[state] || [];
  if (mood >= 0.2) return BEHAVIOR_EMOTES_NEUTRAL[state] || [];
  return BEHAVIOR_EMOTES_SAD[state] || [];
}

function isCatSad() {
  return getPawMood() < 0.2;
}

// Duration ranges per behavior (seconds)
const BEHAVIOR_DURATION = {
  idle: [2, 4],
  sitting: [3, 7],
  walking: [0, 0], // walking duration is distance-based
  scratching: [2, 4],
  drinking: [2, 3],
  eating: [2, 4],
  sleeping: [5, 10],
  playing: [3, 5],
  looking: [2, 4],
  grooming: [3, 5],
  watching: [3, 6],
  sniffing: [2, 3],
};

function initCatAI() {
  const ai = game.catAI;
  ai.x = 300; ai.y = 340;
  ai.targetX = 300; ai.targetY = 340;
  ai.state = 'idle';
  ai.stateTimer = 2;
  ai.nextStateTimer = 0;
  ai.emote = null;
  ai.facing = 1;
  ai.purring = false;
  ai.zzz = 0;
}

function updateCatAI(dt) {
  const ai = game.catAI;

  // Blink
  ai.blinkTimer -= dt;
  if (ai.blinkTimer <= 0) {
    ai.blinkTimer = 2 + Math.random() * 4;
  }

  // Emote timer
  if (ai.emote) {
    ai.emote.timer -= dt;
    if (ai.emote.timer <= 0) ai.emote = null;
  }

  // Sleep zzz counter
  if (ai.state === 'sleeping') {
    ai.zzz += dt;
  } else {
    ai.zzz = 0;
  }

  ai.purring = (ai.state === 'sleeping' || ai.state === 'sitting' || ai.state === 'grooming');

  if (ai.state === 'walking') {
    // Move toward target
    const dx = ai.targetX - ai.x;
    const dy = ai.targetY - ai.y;
    const dist = Math.hypot(dx, dy);
    if (dist < 5) {
      // Arrived — start the queued behavior
      ai.x = ai.targetX;
      ai.y = ai.targetY;
      ai.state = ai._queuedBehavior || 'idle';
      const dur = BEHAVIOR_DURATION[ai.state];
      ai.stateTimer = dur[0] + Math.random() * (dur[1] - dur[0]);
      ai.nextStateTimer = ai.stateTimer;
      // Maybe emote on arrival
      maybeEmote(ai);
    } else {
      const chasing = game.laserActive || (game.thrownToy && !game.thrownToy.settled) || game.throwGrab;
      const speed = (chasing ? 280 : 60) * STAGE_SCALE[game.currentStage];
      ai.x += (dx / dist) * speed * dt;
      ai.y += (dy / dist) * speed * dt;
      ai.facing = dx > 0 ? 1 : -1;
    }
  } else {
    // Count down current behavior
    ai.stateTimer -= dt;
    ai.nextStateTimer -= dt;

    // Random emote during behavior
    if (Math.random() < dt * 0.3 && !ai.emote) {
      maybeEmote(ai);
    }

    if (ai.nextStateTimer <= 0) {
      pickNextBehavior(ai);
    }
  }
}

function maybeEmote(ai) {
  const emotes = getMoodEmotes(ai.state);
  if (emotes && emotes.length > 0 && Math.random() < 0.6) {
    ai.emote = {
      icon: emotes[Math.floor(Math.random() * emotes.length)],
      timer: 1.5
    };
  }
}

function pickNextBehavior(ai) {
  let spots = getFurnitureSpots();
  const sad = isCatSad();

  // Sad cats only do idle, sitting, sleeping — no playing, scratching, etc.
  if (sad) {
    spots = spots.filter(s => s.behavior === 'idle' || s.behavior === 'sitting' || s.behavior === 'sleeping' || s.behavior === 'looking');
    if (spots.length === 0) spots = [{ x: 300, y: 360, behavior: 'sitting', weight: 1 }];
  }

  // Weighted random pick
  const totalWeight = spots.reduce((sum, s) => sum + s.weight, 0);
  let roll = Math.random() * totalWeight;
  let chosen = spots[0];
  for (const spot of spots) {
    roll -= spot.weight;
    if (roll <= 0) { chosen = spot; break; }
  }

  // Walk to the spot, then do the behavior
  ai.targetX = chosen.x + (Math.random() - 0.5) * 20;
  ai.targetY = chosen.y + (Math.random() - 0.5) * 10;
  // Clamp to room bounds
  ai.targetX = Math.max(50, Math.min(W - 160, ai.targetX));
  ai.targetY = Math.max(250, Math.min(H * 0.63, ai.targetY));
  ai._queuedBehavior = chosen.behavior;

  const dist = Math.hypot(ai.targetX - ai.x, ai.targetY - ai.y);
  if (dist > 15) {
    ai.state = 'walking';
    ai.stateTimer = 99; // walking until arrival
  } else {
    // Already close enough
    ai.state = chosen.behavior;
    const dur = BEHAVIOR_DURATION[ai.state];
    ai.stateTimer = dur[0] + Math.random() * (dur[1] - dur[0]);
    maybeEmote(ai);
  }
  ai.nextStateTimer = ai.stateTimer + 0.5;
}

function drawCatBehavior() {
  const ai = game.catAI;
  const s = STAGE_SCALE[game.currentStage];

  // Blink check — eyes briefly close every few seconds
  const isBlinking = ai.blinkTimer > 0 && ai.blinkTimer < 0.15;
  const isWalking = ai.state === 'walking';
  const isSleeping = ai.state === 'sleeping';
  const closed = isSleeping || isBlinking;

  if (isSleeping) {
    // Sleeping: squished lying-down pose with eyes closed inside drawCat
    ctx.save();
    ctx.translate(ai.x, ai.y);
    ctx.scale(1.2, 0.7);
    ctx.translate(-ai.x, -ai.y);
    drawCat(ai.x, ai.y + 8 * s, game.currentCat, game.currentStage, ai.facing, game.time * 0.3, false, true);
    ctx.restore();

    // Zzz animation
    for (let z = 0; z < 3; z++) {
      const zPhase = (ai.zzz * 0.8 + z * 0.7) % 3;
      if (zPhase > 2.5) continue;
      const zx = ai.x + 15 * s + z * 8;
      const zy = ai.y - 30 * s - zPhase * 15;
      ctx.globalAlpha = Math.max(0, 1 - zPhase / 2.5);
      ctx.fillStyle = '#aaf';
      ctx.font = `${(10 + z * 3) * s}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('z', zx, zy);
      ctx.globalAlpha = 1;
    }
  } else if (ai.state === 'scratching') {
    // Reaching up with claw lines
    drawCat(ai.x, ai.y - 5 - Math.abs(Math.sin(game.time * 6)) * 5, game.currentCat, game.currentStage, ai.facing, game.time * 2, false, isBlinking);
    ctx.strokeStyle = 'rgba(200,200,200,0.5)';
    ctx.lineWidth = 1.5;
    for (let sl = 0; sl < 3; sl++) {
      const sx = ai.x + ai.facing * (15 + sl * 5) * s;
      ctx.globalAlpha = Math.max(0, Math.sin(game.time * 8 + sl * 2)) * 0.6;
      ctx.beginPath();
      ctx.moveTo(sx, ai.y - 25 * s);
      ctx.lineTo(sx + 2, ai.y - 10 * s);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  } else if (ai.state === 'drinking' || ai.state === 'eating') {
    const bob = Math.sin(game.time * 5) * 3;
    drawCat(ai.x, ai.y + bob, game.currentCat, game.currentStage, ai.facing, game.time, false, isBlinking);
  } else if (ai.state === 'grooming') {
    ctx.save();
    ctx.translate(ai.x, ai.y);
    ctx.rotate(Math.sin(game.time * 3) * 0.08);
    ctx.translate(-ai.x, -ai.y);
    drawCat(ai.x, ai.y, game.currentCat, game.currentStage, ai.facing, game.time * 1.5, false, isBlinking);
    ctx.restore();
    if (Math.sin(game.time * 4) > 0.7) {
      ctx.fillStyle = '#fff';
      ctx.font = `${8 * s}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('✨', ai.x + ai.facing * 15 * s, ai.y - 10 * s + Math.sin(game.time * 6) * 5);
    }
  } else if (ai.state === 'playing') {
    const playBounce = Math.abs(Math.sin(game.time * 5)) * 8 * s;
    drawCat(ai.x + Math.sin(game.time * 3) * 5, ai.y - playBounce, game.currentCat, game.currentStage, Math.sin(game.time * 2) > 0 ? 1 : -1, game.time * 2, true, isBlinking);
  } else if (ai.state === 'watching') {
    drawCat(ai.x, ai.y, game.currentCat, game.currentStage, ai.facing, game.time * 0.5, false, isBlinking);
  } else if (ai.state === 'sniffing') {
    const sniffBob = Math.sin(game.time * 6) * 2;
    drawCat(ai.x + ai.facing * sniffBob, ai.y, game.currentCat, game.currentStage, ai.facing, game.time, false, isBlinking);
  } else if (ai.state === 'sitting') {
    drawCat(ai.x, ai.y + Math.sin(game.time * 1) * 1.5, game.currentCat, game.currentStage, ai.facing, game.time * 0.5, false, isBlinking);
  } else {
    drawCat(ai.x, ai.y, game.currentCat, game.currentStage, ai.facing, game.time, isWalking, isBlinking);
  }

  // Emote bubble
  if (ai.emote) {
    const eAlpha = Math.min(1, ai.emote.timer * 3);
    ctx.globalAlpha = eAlpha;
    // Bubble
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    const bubX = ai.x + 20 * s;
    const bubY = ai.y - 45 * s - (1.5 - ai.emote.timer) * 8;
    ctx.beginPath();
    ctx.arc(bubX, bubY, 14, 0, Math.PI * 2);
    ctx.fill();
    // Tail of bubble
    ctx.beginPath();
    ctx.moveTo(bubX - 6, bubY + 12);
    ctx.lineTo(ai.x + 8 * s, ai.y - 25 * s);
    ctx.lineTo(bubX + 2, bubY + 12);
    ctx.fill();
    // Emote icon
    ctx.font = '16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ai.emote.icon, bubX, bubY + 5);
    ctx.globalAlpha = 1;
  }

  // Purring indicator (small lines near body)
  if (ai.purring && ai.state !== 'sleeping') {
    ctx.globalAlpha = 0.3 + Math.sin(game.time * 8) * 0.2;
    ctx.strokeStyle = '#fda';
    ctx.lineWidth = 1;
    for (let pi = 0; pi < 3; pi++) {
      const pAngle = game.time * 3 + pi * 2.1;
      const pr = 20 * s + Math.sin(pAngle) * 5;
      ctx.beginPath();
      ctx.arc(ai.x, ai.y - 5 * s, pr, pAngle, pAngle + 0.4);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Behavior label (subtle)
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  const stateLabel = {
    idle: '', sitting: 'sitting', walking: '', scratching: 'scratching!',
    drinking: 'drinking...', eating: 'eating...', sleeping: 'sleeping...',
    playing: 'playing!', looking: 'looking around', grooming: 'grooming',
    watching: 'watching...', sniffing: 'sniffing',
  };
  if (stateLabel[ai.state]) {
    ctx.fillText(stateLabel[ai.state], ai.x, ai.y + 30 * s);
  }
}

function updateCare(dt) {
  if (game.careAnim) {
    game.careAnim.timer -= dt;
    if (game.careAnim.timer <= 0) {
      game.careAnim = null;
    }
  }

  // Night mode — every 5 minutes for 30 seconds
  game.nightTimer += dt;
  if (!game.isNight && game.nightTimer >= 300) {
    game.isNight = true;
    game.nightDuration = 30;
    game.nightTimer = 0;
  }
  if (game.isNight) {
    game.nightDuration -= dt;
    if (game.nightDuration <= 0) {
      game.isNight = false;
      game.nightDuration = 0;
    }
  }

  // During night, force all cats to sleep
  if (game.isNight) {
    const ai = game.catAI;
    if (ai.state !== 'sleeping') {
      ai.state = 'sleeping';
      ai.stateTimer = 30;
      ai.nextStateTimer = 30;
    }
  }

  // Interactive laser pointer
  if (game.laserActive && mouse.down && game.screen === 'care') {
    game.laserDotX = mouse.x;
    game.laserDotY = mouse.y;
    // All cats chase the dot
    const ai = game.catAI;
    if (!game.isNight && ai.state !== 'sleeping') {
      ai.targetX = game.laserDotX + (Math.random() - 0.5) * 15;
      ai.targetY = Math.min(game.laserDotY, H * 0.63);
      ai._queuedBehavior = 'playing';
      ai.state = 'walking';
      ai.stateTimer = 0.5;
      ai.nextStateTimer = 1;
    }
    // House cats also chase
    game.houseCats.forEach(idx => {
      const st = getHouseCatState(idx);
      if (st.state !== 'sleeping' || !game.isNight) {
        st.targetX = game.laserDotX + (Math.random() - 0.5) * 20;
        st.targetY = Math.min(game.laserDotY + (Math.random() - 0.5) * 15, H * 0.63);
        st.state = 'walking';
        st.timer = 2;
      }
    });
  }
  if (game.laserActive && !mouse.down) {
    game.laserActive = false;
  }

  // Thrown toy physics
  if (game.thrownToy) {
    const tt = game.thrownToy;
    if (!tt.settled) {
      tt.x += tt.vx * dt;
      tt.y += tt.vy * dt;
      tt.vx *= 0.97; // friction
      tt.vy *= 0.97;
      // Bounce off walls
      if (tt.x < 30) { tt.x = 30; tt.vx *= -0.6; }
      if (tt.x > W - 30) { tt.x = W - 30; tt.vx *= -0.6; }
      if (tt.y < 100) { tt.y = 100; tt.vy *= -0.6; }
      if (tt.y > H * 0.63) { tt.y = H * 0.63; tt.vy *= -0.4; }
      // Settle when slow enough
      if (Math.hypot(tt.vx, tt.vy) < 15) {
        tt.settled = true;
        // Update toy's resting position
        game.furniturePos[`toy_${tt.toyIdx}`] = { x: tt.x, y: tt.y };
        // Settle timer — cats lose interest after a bit
        tt.settleTimer = 3;
      }

      // Cats chase the flying toy (like laser)
      const ai = game.catAI;
      if (!game.isNight && ai.state !== 'sleeping') {
        ai.targetX = tt.x + (Math.random() - 0.5) * 10;
        ai.targetY = Math.min(tt.y, H * 0.63);
        ai._queuedBehavior = 'playing';
        ai.state = 'walking';
        ai.stateTimer = 0.3;
        ai.nextStateTimer = 1;
      }
      game.houseCats.forEach(idx => {
        const st = getHouseCatState(idx);
        if (!game.isNight) {
          st.targetX = tt.x + (Math.random() - 0.5) * 20;
          st.targetY = Math.min(tt.y + (Math.random() - 0.5) * 10, H * 0.63);
          st.state = 'walking';
          st.timer = 2;
        }
      });
    } else {
      // Settled — count down then clear
      tt.settleTimer -= dt;
      if (tt.settleTimer <= 0) {
        game.thrownToy = null;
      }
    }
  }

  // Thrown toy grab — cats chase the held toy too
  if (game.throwGrab) {
    const tg = game.throwGrab;
    const ai = game.catAI;
    if (!game.isNight && ai.state !== 'sleeping') {
      ai.targetX = tg.curX + (Math.random() - 0.5) * 10;
      ai.targetY = Math.min(tg.curY, H * 0.63);
      ai._queuedBehavior = 'playing';
      ai.state = 'walking';
      ai.stateTimer = 0.3;
      ai.nextStateTimer = 1;
    }
    game.houseCats.forEach(idx => {
      const st = getHouseCatState(idx);
      if (!game.isNight) {
        st.targetX = tg.curX + (Math.random() - 0.5) * 15;
        st.targetY = Math.min(tg.curY, H * 0.63);
        st.state = 'walking';
        st.timer = 1;
      }
    });
  }

  // Update confetti
  game.confetti = game.confetti.filter(c => {
    c.x += c.vx * dt;
    c.y += c.vy * dt;
    c.vy += 120 * dt; // gravity
    c.rot += c.rotSpeed * dt;
    c.life -= dt;
    return c.life > 0;
  });

  updateCatAI(dt);
  updateHouseCats(dt);
}

function spawnConfetti(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    game.confetti.push({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy - Math.random() * 30,
      vx: (Math.random() - 0.5) * 200,
      vy: -150 - Math.random() * 200,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 10,
      color: ['#f44','#4a4','#44f','#fa0','#f6a','#4af','#ff0','#a4f'][Math.floor(Math.random() * 8)],
      size: 4 + Math.random() * 5,
      life: 2.5 + Math.random() * 1.5,
    });
  }
}

function drawConfetti() {
  game.confetti.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = Math.min(1, c.life);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.size / 2, -c.size / 4, c.size, c.size / 2);
    ctx.restore();
  });
  ctx.globalAlpha = 1;
}

function drawCare() {
  drawHomeBg();

  // Draw owned furniture in the home
  drawFurniture();

  // Draw collected cats that are set to show in the house
  drawHouseCats();

  // Stage label
  ctx.fillStyle = '#a86e3e';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`${CAT_BREEDS[game.currentCat].name} — ${STAGES[game.currentStage]}`, W / 2, 35);

  // Draw cat with AI behavior
  drawCatBehavior();
  const catX = game.catAI.x, catY = game.catAI.y;

  // Care animation (floats above cat)
  if (game.careAnim) {
    const a = game.careAnim;
    ctx.font = '36px sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.min(1, a.timer * 2);
    const animY = catY - 60 - (1.5 - a.timer) * 30;
    ctx.fillText(a.icon, catX, animY);
    ctx.globalAlpha = 1;
  }

  // Paw meter on the right
  drawPawMeter(680, 280, game.care, 1.2);

  // Stage progress
  ctx.fillStyle = '#865';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Paw Meter', 680, 180);

  // Growth progress display
  ctx.fillStyle = '#666';
  ctx.font = '12px sans-serif';
  const stageStr = STAGES.map((s, i) => i === game.currentStage ? `[${s}]` : s).join(' → ');
  ctx.fillText(stageStr, W / 2, 60);

  // Money display (top left)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  drawRoundRect(10, 10, 110, 32, 8);
  ctx.fill();
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`💰 $${game.money}`, 20, 32);

  // Store button (top left, below money)
  drawButton(10, 50, 110, 38, 'Store', '#e07050', true, '🏪');
  if (mouse.clicked && hitBox(mouse.x, mouse.y, 10, 50, 110, 38)) {
    sfxClick();
    game.storeCategory = 0;
    game.storeScroll = 0;
    game.screen = 'store';
  }

  // Activity buttons
  const btnW = 105, btnH = 55;
  const btnY = H - 85;
  const totalW = ACTIVITIES.length * btnW + (ACTIVITIES.length - 1) * 8;
  const btnStartX = (W - totalW) / 2;

  for (let i = 0; i < ACTIVITIES.length; i++) {
    const bx = btnStartX + i * (btnW + 8);
    const done = game.care[ACTIVITIES[i]] >= MAX_PER_ACTIVITY;
    const color = done ? '#999' : ACTIVITY_COLORS[i];
    const hover = drawButton(bx, btnY, btnW, btnH, ACTIVITY_LABELS[i], color, !done, ACTIVITY_ICONS[i]);

    if (mouse.clicked && hitBox(mouse.x, mouse.y, bx, btnY, btnW, btnH) && !done && !game.careAnim) {
      const act = ACTIVITIES[i];
      if (act === 'walk' || act === 'gather') {
        // Go to walk screen
        sfxClick();
        initWalk();
        game.screen = 'walk';
      } else {
        // Instant activity with animation
        sfxClick();
        game.care[act]++;
        game.careAnim = { type: act, timer: 1.5, icon: ACTIVITY_ICONS[i] };
        addFloat(catX, catY - 80, `+1 ${ACTIVITY_LABELS[i]}!`, ACTIVITY_COLORS[i]);

        if (game.care[act] >= MAX_PER_ACTIVITY) {
          setTimeout(() => sfxComplete(), 200);
          addFloat(680, 230, `${ACTIVITY_LABELS[i]} Complete!`, '#4a2');
        }

        checkGrowth();
      }
    }
  }

  // Cat collection button (top right) — always visible
  const catBtnLabel = game.cats.length > 0 ? `Cats: ${game.cats.length}` : 'My Cats';
  drawButton(W - 120, 10, 110, 35, catBtnLabel, '#6c5ce7', true);
  if (mouse.clicked && hitBox(mouse.x, mouse.y, W - 120, 10, 110, 35)) {
    sfxClick();
    game.screen = 'collection';
  }

  // Drag furniture or click-to-interact
  if (game.screen === 'care') {
    const mx = mouse.x, my = mouse.y;
    const onButton = hitBox(mx, my, 10, 10, 110, 110) || hitBox(mx, my, W - 120, 10, 110, 35);

    // Handle drag in progress
    if (game.dragging && mouse.down) {
      const id = game.dragging.id;
      const newX = mx - game.dragging.offX;
      const newY = my - game.dragging.offY;
      // Clamp within room
      game.furniturePos[id] = {
        x: Math.max(30, Math.min(W - 30, newX)),
        y: Math.max(100, Math.min(H * 0.65, newY))
      };
      game.dragging.moved = true;
    }

    // End drag
    if (game.dragging && !mouse.down) {
      const wasDrag = game.dragging.moved;
      game.dragging = null;
      // If it was a real drag (moved), don't treat as click
      if (wasDrag) { mouse.clicked = false; }
    }

    // Start drag on mousedown — special toys: laser, throwables
    const THROWABLE_TOYS = ['yarn', 'bell', 'mousetoy', 'fish_toy'];
    if (mouse.down && !game.dragging && !game.laserActive && !game.throwGrab) {
      const boxes = getFurnitureHitboxes();
      for (const box of boxes) {
        if (box.dragId && mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h && !onButton) {
          // Laser toy
          if (box.label === 'Laser') {
            game.laserActive = true;
            game.laserDotX = mx; game.laserDotY = my;
            break;
          }
          // Throwable toy — grab it
          if (box.dragId.startsWith('toy_')) {
            const tidx = parseInt(box.dragId.split('_')[1]);
            const toyId = game.ownedToys[tidx];
            if (THROWABLE_TOYS.includes(toyId)) {
              game.throwGrab = { toyIdx: tidx, startX: mx, startY: my, curX: mx, curY: my };
              break;
            }
          }
          const pos = box.dragId.startsWith('toy_') ? getToyXY(parseInt(box.dragId.split('_')[1])) : getFurnitureXY(box.dragId);
          game.dragging = { id: box.dragId, offX: mx - pos.x, offY: my - pos.y, moved: false };
          break;
        }
      }
    }

    // Update throw grab position
    if (game.throwGrab && mouse.down) {
      game.throwGrab.curX = mx;
      game.throwGrab.curY = my;
    }

    // Release throw — launch the toy!
    if (game.throwGrab && !mouse.down) {
      const tg = game.throwGrab;
      const dx = tg.curX - tg.startX;
      const dy = tg.curY - tg.startY;
      const dist = Math.hypot(dx, dy);
      if (dist > 10) {
        // Fling it!
        const tp = getToyXY(tg.toyIdx);
        game.thrownToy = {
          id: game.ownedToys[tg.toyIdx],
          toyIdx: tg.toyIdx,
          x: tg.curX, y: tg.curY,
          vx: dx * 3, vy: dy * 3,
          settled: false,
        };
        sfxDash();
      }
      game.throwGrab = null;
    }

    // Click-to-interact (only if not dragging)
    if (mouse.clicked && !game.dragging) {
      const inRoom = my > 70 && my < H - 90 && mx > 0 && mx < W - 150;
      if (inRoom && !onButton) {
        if (isCatSad()) {
          game.catAI.emote = { icon: '😿', timer: 1.5 };
        } else {
          const ai = game.catAI;
          const boxes = getFurnitureHitboxes();
          let clickedItem = null;
          for (const box of boxes) {
            if (mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h) {
              clickedItem = box; break;
            }
          }
          if (clickedItem) {
            ai.targetX = clickedItem.targetX;
            ai.targetY = clickedItem.targetY;
            ai._queuedBehavior = clickedItem.behavior;
            ai.state = 'walking';
            ai.stateTimer = 99;
            ai.nextStateTimer = 8;
            addFloat(mx, my - 10, clickedItem.label, '#fff');
            sfxClick();
          } else {
            ai.targetX = Math.max(50, Math.min(W - 160, mx));
            ai.targetY = Math.max(250, Math.min(H * 0.63, my));
            ai._queuedBehavior = 'idle';
            ai.state = 'walking';
            ai.stateTimer = 99;
            ai.nextStateTimer = 5;
          }
        }
      }
    }

    // Furniture hover highlight + drag visual
    const boxes = getFurnitureHitboxes();
    for (const box of boxes) {
      const hovering = mx >= box.x && mx <= box.x + box.w && my >= box.y && my <= box.y + box.h;
      const beingDragged = game.dragging && game.dragging.id === box.dragId;

      if (hovering || beingDragged) {
        ctx.strokeStyle = beingDragged ? 'rgba(255,200,50,0.7)' : 'rgba(255,255,255,0.5)';
        ctx.lineWidth = beingDragged ? 3 : 2;
        ctx.setLineDash(beingDragged ? [] : [4, 4]);
        drawRoundRect(box.x - 2, box.y - 2, box.w + 4, box.h + 4, 6);
        ctx.stroke();
        ctx.setLineDash([]);

        if (!beingDragged) {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          drawRoundRect(mx - 40, my - 22, 80, 18, 5);
          ctx.fill();
          ctx.fillStyle = '#fff';
          ctx.font = '11px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(`${box.label} (drag)`, mx, my - 9);
        }
        if (!beingDragged) break;
      }
    }
  }

  // Mood indicator
  const mood = getPawMood();
  const moodLabel = mood >= 0.5 ? '😸 Happy' : mood >= 0.2 ? '😐 Okay' : '😿 Sad';
  const moodColor = mood >= 0.5 ? '#4a4' : mood >= 0.2 ? '#aa8' : '#c44';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  drawRoundRect(10, 95, 110, 22, 6);
  ctx.fill();
  ctx.fillStyle = moodColor;
  ctx.font = 'bold 13px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(moodLabel, 20, 111);

  // Interactive laser dot
  if (game.laserActive) {
    ctx.fillStyle = 'rgba(255,0,0,0.7)';
    ctx.beginPath(); ctx.arc(game.laserDotX, game.laserDotY, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,100,100,0.2)';
    ctx.beginPath(); ctx.arc(game.laserDotX, game.laserDotY, 12, 0, Math.PI * 2); ctx.fill();
  }

  // Thrown toy in flight
  if (game.thrownToy && !game.thrownToy.settled) {
    const tt = game.thrownToy;
    const toyIcons = { yarn: '🧶', bell: '🔔', mousetoy: '🐭', fish_toy: '🐠' };
    // Spin effect
    ctx.save();
    ctx.translate(tt.x, tt.y);
    ctx.rotate(game.time * 12);
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(toyIcons[tt.id] || '⚾', 0, 6);
    ctx.restore();
    // Motion trail
    ctx.globalAlpha = 0.3;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(toyIcons[tt.id] || '⚾', tt.x - tt.vx * 0.03, tt.y - tt.vy * 0.03 + 4);
    ctx.fillText(toyIcons[tt.id] || '⚾', tt.x - tt.vx * 0.06, tt.y - tt.vy * 0.06 + 4);
    ctx.globalAlpha = 1;
  }

  // Throw grab — show toy following cursor with aim line
  if (game.throwGrab) {
    const tg = game.throwGrab;
    const toyId = game.ownedToys[tg.toyIdx];
    const toyIcons = { yarn: '🧶', bell: '🔔', mousetoy: '🐭', fish_toy: '🐠' };
    // Aim line
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(tg.startX, tg.startY);
    ctx.lineTo(tg.curX, tg.curY);
    ctx.stroke();
    ctx.setLineDash([]);
    // Toy at cursor
    ctx.font = '24px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(toyIcons[toyId] || '⚾', tg.curX, tg.curY + 8);
    // Hint
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px sans-serif';
    ctx.fillText('Release to throw!', tg.curX, tg.curY - 15);
  }

  // Confetti
  drawConfetti();

  // Night mode overlay
  if (game.isNight) {
    ctx.fillStyle = `rgba(10,10,40,${0.55 + Math.sin(game.time * 0.5) * 0.05})`;
    ctx.fillRect(0, 0, W, H);
    // Stars
    ctx.fillStyle = '#fff';
    for (let i = 0; i < 30; i++) {
      const sx = (i * 167 + 13) % W;
      const sy = (i * 97 + 43) % (H * 0.4);
      ctx.globalAlpha = 0.3 + Math.sin(game.time * 2 + i) * 0.3;
      ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Moon
    ctx.fillStyle = '#ffe888';
    ctx.beginPath(); ctx.arc(W - 80, 60, 25, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `rgba(10,10,40,${0.55})`;
    ctx.beginPath(); ctx.arc(W - 70, 55, 22, 0, Math.PI * 2); ctx.fill();
    // Night label
    ctx.fillStyle = '#aaccff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🌙 Night Time — Shhh...', W / 2, H - 100);
    const remaining = Math.ceil(game.nightDuration);
    ctx.font = '12px sans-serif';
    ctx.fillText(`${remaining}s until morning`, W / 2, H - 82);
  }

  drawFloats();
}

const FURNITURE_DEFAULTS = {
  catbed: { x: 150, y: 348 }, catbed_blue: { x: 420, y: 348 }, catbed_green: { x: 340, y: 348 },
  scratchpost: { x: 480, y: 300 }, scratchpost_dark: { x: 460, y: 300 },
  cattower: { x: 520, y: 270 }, cattower_pink: { x: 500, y: 270 },
  foodbowl: { x: 200, y: 372 }, foodbowl_blue: { x: 230, y: 372 },
  fountain: { x: 100, y: 348 }, fountain_gold: { x: 130, y: 348 },
  blanket: { x: 410, y: 366 }, blanket_blue: { x: 350, y: 366 }, blanket_pink: { x: 380, y: 366 },
  hammock: { x: 95, y: 195 }, hammock_green: { x: 95, y: 195 },
  fishtank: { x: 475, y: 230 }, plant: { x: 70, y: 345 }, plant_flower: { x: 90, y: 345 },
  rug: { x: 300, y: 372 }, rug_blue: { x: 300, y: 372 }, rug_green: { x: 300, y: 372 },
  bookshelf: { x: 40, y: 180 },
  toybox: { x: 258, y: 336 }, toybox_pink: { x: 280, y: 336 },
  nightlight: { x: 540, y: 278 }, nightlight_star: { x: 555, y: 278 },
  painting: { x: 375, y: 162 }, painting_sky: { x: 425, y: 162 },
};

// Map variant IDs to their base furniture type for behavior/hitbox purposes
const FURNITURE_BASE = {};
Object.keys(FURNITURE_DEFAULTS).forEach(id => {
  // Base type is the part before the last underscore variant, if it matches a known base
  const bases = ['catbed','scratchpost','cattower','foodbowl','fountain','blanket','hammock','fishtank','plant','rug','bookshelf','toybox','nightlight','painting'];
  FURNITURE_BASE[id] = bases.find(b => id === b || id.startsWith(b + '_')) || id;
});

// Toy default spots
const TOY_DEFAULT_SPOTS = [
  { x: 340, y: 366 }, { x: 180, y: 360 }, { x: 460, y: 372 },
  { x: 120, y: 366 }, { x: 280, y: 378 }, { x: 400, y: 360 },
  { x: 220, y: 372 }, { x: 500, y: 366 },
];

function getFurnitureXY(id) {
  return game.furniturePos[id] || FURNITURE_DEFAULTS[id] || { x: 300, y: 350 };
}

function getToyXY(idx) {
  const key = `toy_${idx}`;
  if (game.furniturePos[key]) return game.furniturePos[key];
  return TOY_DEFAULT_SPOTS[idx % TOY_DEFAULT_SPOTS.length];
}

function getFurnitureOffset(id) {
  const def = FURNITURE_DEFAULTS[id];
  if (!def) return { dx: 0, dy: 0 };
  const pos = getFurnitureXY(id);
  return { dx: pos.x - def.x, dy: pos.y - def.y };
}

// ============================================================
// FURNITURE DRAWING (in home)
// ============================================================
function drawFurniture() {
  const owned = game.furniture;

  // Helper: wrap each item with position offset
  function withOffset(id, fn) {
    const off = getFurnitureOffset(id);
    ctx.save();
    ctx.translate(off.dx, off.dy);
    fn();
    ctx.restore();
  }

  if (owned.includes('catbed')) { withOffset('catbed', () => {
    ctx.fillStyle = '#d4627a';
    drawEllipse(150, H * 0.58, 35, 14);
    ctx.fill();
    ctx.fillStyle = '#e88aa0';
    drawEllipse(150, H * 0.57, 28, 10);
    ctx.fill();
  }); }

  if (owned.includes('scratchpost')) { withOffset('scratchpost', () => {
    const spx = 480, spy = H * 0.38;
    // Post
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(spx - 6, spy, 12, H * 0.28);
    // Rope wrapping
    ctx.strokeStyle = '#e8c880';
    ctx.lineWidth = 3;
    for (let ry = 0; ry < H * 0.28; ry += 8) {
      ctx.beginPath();

    if (toyId === 'featherwand') {

      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx + 20, ty - 25); ctx.stroke();
      const featherWave = Math.sin(game.time * 2) * 3;
      ctx.fillStyle = '#e55';
      ctx.beginPath(); ctx.ellipse(tx + 20, ty - 27 + featherWave, 3, 8, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#55e';
      ctx.beginPath(); ctx.ellipse(tx + 23, ty - 25 + featherWave, 3, 7, -0.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#e5e';
      ctx.beginPath(); ctx.ellipse(tx + 17, ty - 26 + featherWave, 2, 6, 0.5, 0, Math.PI * 2); ctx.fill();
    }
    if (toyId === 'butterfly') {
      const bfly = Math.sin(game.time * 4) * 0.4;
      const bx2 = tx + Math.sin(game.time * 1.5) * 8;
      const by2 = ty - 10 + Math.sin(game.time * 2) * 5;
      ctx.fillStyle = '#f6a';
      ctx.beginPath(); ctx.ellipse(bx2 - 5, by2, 5 + bfly * 3, 4, -0.3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(bx2 + 5, by2, 5 + bfly * 3, 4, 0.3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.ellipse(bx2, by2, 1.5, 4, 0, 0, Math.PI * 2); ctx.fill();
    }
    if (toyId === 'laser') {
      ctx.fillStyle = '#666';
      drawRoundRect(tx - 3, ty - 2, 16, 6, 2);

      ctx.fillStyle = '#e22';
      ctx.beginPath(); ctx.arc(tx + 14, ty + 1, 2, 0, Math.PI * 2); ctx.fill();
      if (!game.laserActive) {
        // Auto laser dot when not being controlled
        const dotX = tx + 40 + Math.sin(game.time * 3) * 30;
        const dotY = ty - 10 + Math.cos(game.time * 2.3) * 15;
        ctx.fillStyle = 'rgba(255,0,0,0.6)';
        ctx.beginPath(); ctx.arc(dotX, dotY, 3, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,100,100,0.2)';
        ctx.beginPath(); ctx.arc(dotX, dotY, 8, 0, Math.PI * 2); ctx.fill();
      }
      // Label hint
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('click & drag!', tx + 5, ty + 12);
    }
    if (toyId === 'rc_car') {
      const carX = tx + Math.sin(game.time * 1.2) * 15;
      const carY = ty + Math.cos(game.time * 0.8) * 5;
      ctx.fillStyle = '#44a';
      drawRoundRect(carX - 10, carY - 4, 20, 8, 3);
      ctx.fill();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(carX - 6, carY + 4, 3, 0, Math.PI * 2); ctx.fill();

      // Mouse ears on top
      ctx.fillStyle = '#888';
      ctx.beginPath(); ctx.arc(carX - 4, carY - 5, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(carX + 4, carY - 5, 3, 0, Math.PI * 2); ctx.fill();
    }
  });
}

// ============================================================
// HOUSE CATS (collected cats wandering in the home)
// ============================================================
// Each house cat gets a simple autonomous wander state
const houseCatStates = {}; // keyed by cat index

function getHouseCatState(idx) {
  if (!houseCatStates[idx]) {
    houseCatStates[idx] = {
      x: 100 + Math.random() * 400,
      y: 300 + Math.random() * 60,
      targetX: 100 + Math.random() * 400,
      targetY: 300 + Math.random() * 60,
      facing: Math.random() > 0.5 ? 1 : -1,
      state: 'idle', // idle, walking, sitting, sleeping, grooming
      timer: 2 + Math.random() * 4,
    };
  }
  return houseCatStates[idx];
}

function updateHouseCats(dt) {
  game.houseCats.forEach(idx => {
    const st = getHouseCatState(idx);
    st.timer -= dt;

    // Night mode — force sleep
    if (game.isNight && st.state !== 'sleeping') {
      st.state = 'sleeping'; st.timer = 30; return;
    }

    if (st.state === 'walking') {
      const dx = st.targetX - st.x, dy = st.targetY - st.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 5) {
        st.x = st.targetX; st.y = st.targetY;
        st.state = ['idle', 'sitting', 'sleeping', 'grooming'][Math.floor(Math.random() * 4)];
        st.timer = 3 + Math.random() * 5;
      } else {
        const hcChasing = game.laserActive || (game.thrownToy && !game.thrownToy.settled) || game.throwGrab;
        const spd = hcChasing ? 250 : 40;
        st.x += (dx / dist) * spd * dt;
        st.y += (dy / dist) * spd * dt;
        st.facing = dx > 0 ? 1 : -1;
      }
    } else if (st.timer <= 0) {
      // Pick new behavior
      st.targetX = 60 + Math.random() * 480;
      st.targetY = 290 + Math.random() * 70;
      st.state = 'walking';
      st.timer = 10;
    }
  });
}

function drawHouseCats() {
  game.houseCats.forEach(idx => {
    if (idx >= game.cats.length) return;
    const cat = game.cats[idx];
    const st = getHouseCatState(idx);
    const isWalking = st.state === 'walking';
    const isSleeping = st.state === 'sleeping';

    if (isSleeping) {
      ctx.save();
      ctx.translate(st.x, st.y);
      ctx.scale(1.1, 0.7);
      ctx.translate(-st.x, -st.y);
      drawCat(st.x, st.y + 4, cat.breed, 3, st.facing, game.time * 0.3 + idx, false, true);
      ctx.restore();
      // Mini zzz
      ctx.fillStyle = '#aaf';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      const zPhase = (game.time * 0.8 + idx) % 2;
      ctx.globalAlpha = Math.max(0, 1 - zPhase);
      ctx.fillText('z', st.x + 10, st.y - 15 - zPhase * 8);
      ctx.globalAlpha = 1;
    } else if (st.state === 'grooming') {
      ctx.save();
      ctx.translate(st.x, st.y);
      ctx.rotate(Math.sin(game.time * 3 + idx) * 0.06);
      ctx.translate(-st.x, -st.y);
      drawCat(st.x, st.y, cat.breed, 3, st.facing, game.time + idx, false);
      ctx.restore();
    } else {
      drawCat(st.x, st.y, cat.breed, 3, st.facing, game.time + idx, isWalking);
    }

    // Name tag
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(CAT_BREEDS[cat.breed].name, st.x, st.y + 25);
  });
}

function checkGrowth() {
  const allDone = ACTIVITIES.every(a => game.care[a] >= MAX_PER_ACTIVITY);
  if (allDone) {
    if (game.currentStage < 3) {
      setTimeout(() => {
        game.currentStage++;
        resetCare();
        sfxGrow();
        spawnConfetti(game.catAI.x, game.catAI.y - 30, 60);
        addFloat(300, 250, `Grew into a ${STAGES[game.currentStage]}!`, '#fa0');
        if (game.currentStage === 3) {
          // Adult! Time for the chase
          setTimeout(() => {
            addFloat(300, 200, 'Time to run home!', '#f44');
            setTimeout(() => {
              initChase();
              game.screen = 'chase';
            }, 1500);
          }, 1000);
        }
      }, 500);
    }
  }
}

      drawButton(W - 40, gridY, 30, 24, '▲', '#888', true);
      if (mouse.clicked && hitBox(mouse.x, mouse.y, W - 40, gridY, 30, 24)) {
        game.storeScroll = Math.max(0, game.storeScroll - (cardH + gapY));

      drawButton(W - 40, H - 72, 30, 24, '▼', '#888', true);

    ctx.fillText(item.icon, cx + 30, cy + 40);

    // Name
    ctx.fillStyle = '#444';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(item.name, cx + 55, cy + 28);

    ctx.fillStyle = '#888';
    ctx.font = '11px sans-serif';
    ctx.fillText(item.desc, cx + 55, cy + 44);

      if (item.cat === 'accessories') {

        const eqBtnX = cx + cardW - 68;

        const eqColor = equipped ? '#e07050' : '#6c5ce7';

        drawButton(eqBtnX, eqBtnY, 60, 26, eqLabel, eqColor, true);
        if (mouse.clicked && hitBox(mouse.x, mouse.y, eqBtnX, eqBtnY, 60, 26)) {
          if (equipped) {
            // Unequip
            game.equipped[item.slot] = null;
            sfxEquip();
          } else {
            // Equip (replaces current in that slot)
            game.equipped[item.slot] = item.id;
            sfxEquip();
            addFloat(cx + cardW / 2, cy, 'Equipped!', '#6c5ce7');

        }
      } else if (item.cat === 'furniture') {
        ctx.fillStyle = '#6a6';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✓ Placed', cx + cardW / 2, cy + cardH - 16);
      } else {
        // Consumables can be re-bought
        const bbx = cx + cardW - 68;
        const bby = cy + cardH - 34;
        const canAfford = game.money >= item.price;
        drawButton(bbx, bby, 60, 26, `$${item.price}`, canAfford ? '#4a9' : '#999', canAfford);
        if (mouse.clicked && hitBox(mouse.x, mouse.y, bbx, bby, 60, 26)) {

            buyItem(item);

          }

      }
    } else {
      // Buy button
      const bbx = cx + cardW - 68;
      const bby = cy + cardH - 34;
      const canAfford = game.money >= item.price;
      drawButton(bbx, bby, 60, 26, `$${item.price}`, canAfford ? '#4a9' : '#999', canAfford);
      if (mouse.clicked && hitBox(mouse.x, mouse.y, bbx, bby, 60, 26)) {

          sfxNope();

      }

    // Equipped badge
    if (equipped) {
      ctx.fillStyle = '#6c5ce7';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('EQUIPPED', cx + cardW - 8, cy + 16);
    }

  // Cat preview with accessories (bottom right)
  if (game.currentCat !== null) {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    drawRoundRect(W - 140, H - 160, 130, 145, 10);

    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    drawRoundRect(W - 140, H - 160, 130, 145, 10);
    ctx.stroke();
    ctx.fillStyle = '#888';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Preview', W - 75, H - 145);
    drawCat(W - 75, H - 75, game.currentCat, game.currentStage, 1, game.time, false);
  }

  drawFloats();
}

function buyItem(item) {
  game.money -= item.price;
  sfxBuy();

  if (item.cat === 'food') {
    // Food: consumable, apply feed + show in home
    const amount = item.effect.amount;
    const prev = game.care.feed;
    game.care.feed = Math.min(MAX_PER_ACTIVITY, game.care.feed + amount);
    const gained = game.care.feed - prev;
    addFloat(400, 200, `+${gained} Feed!`, '#4a9');
    if (game.care.feed >= MAX_PER_ACTIVITY) setTimeout(() => sfxComplete(), 200);
    checkGrowth();
  } else if (item.cat === 'toys') {
    // Toys: give play bonus AND persist at home
    const amount = item.effect.amount;
    const prev = game.care.play;
    game.care.play = Math.min(MAX_PER_ACTIVITY, game.care.play + amount);
    const gained = game.care.play - prev;
    addFloat(400, 200, `+${gained} Play!`, '#4a9');
    if (!game.ownedToys.includes(item.id)) game.ownedToys.push(item.id);
    if (game.care.play >= MAX_PER_ACTIVITY) setTimeout(() => sfxComplete(), 200);
    checkGrowth();
  } else if (item.cat === 'accessories') {
    // Accessories: add to inventory AND auto-equip
    if (!game.inventory.includes(item.id)) game.inventory.push(item.id);
    game.equipped[item.slot] = item.id;
    sfxEquip();
    addFloat(400, 200, `${item.name} equipped!`, '#b8f');
  } else if (item.cat === 'furniture') {
    if (!game.furniture.includes(item.id)) game.furniture.push(item.id);
    addFloat(400, 200, `${item.name} placed at home!`, '#8d6');
  }
}
